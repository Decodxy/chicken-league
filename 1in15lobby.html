<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1in15 Lobby | Chicken League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --arena-gold: #fbbf24;
            --arena-glow: rgba(251, 191, 36, 0.5);
            --bg-dark: #050505;
        }
        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(251, 191, 36, 0.05) 0%, transparent 70%);
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .slot-circle {
            width: 56px; height: 56px;
            border-radius: 50%;
            border: 2px dashed rgba(255,255,255,0.12);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.01);
            position: relative;
            flex-shrink: 0;
        }
        .slot-filled {
            background: rgba(251, 191, 36, 0.1);
            border: 2px solid var(--arena-gold);
            box-shadow: 0 0 20px var(--arena-glow);
            transform: scale(1.08);
            border-style: solid;
        }
        .slot-mine {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            box-shadow: 0 0 28px rgba(255,255,255,0.3);
            transform: scale(1.12);
        }
        .countdown-ring {
            position: relative;
            width: 110px; height: 110px;
            margin: 0 auto;
        }
        .countdown-ring svg {
            transform: rotate(-90deg);
            position: absolute; top: 0; left: 0;
        }
        .countdown-ring .ring-bg {
            fill: none;
            stroke: rgba(255,255,255,0.05);
            stroke-width: 5;
        }
        .countdown-ring .ring-fill {
            fill: none;
            stroke: var(--arena-gold);
            stroke-width: 5;
            stroke-linecap: round;
            stroke-dasharray: 314;
            stroke-dashoffset: 314;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 6px var(--arena-gold));
        }
        .countdown-ring .ring-text {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .code-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            color: white;
            letter-spacing: 0.3em;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .code-input:focus {
            border-color: var(--arena-gold);
            box-shadow: 0 0 20px rgba(251,191,36,0.2);
        }
        .code-input::placeholder { color: rgba(255,255,255,0.2); letter-spacing: 0.2em; }
        .btn-loading {
            position: relative;
            pointer-events: none;
            opacity: 0.7;
        }
        .btn-loading::after {
            content: "";
            position: absolute; width: 16px; height: 16px;
            top: 0; left: 0; right: 0; bottom: 0; margin: auto;
            border: 2px solid transparent;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #toast {
            position: fixed;
            bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px; border-radius: 12px;
            font-size: 11px; font-weight: bold; letter-spacing: 0.1em;
            font-family: 'Orbitron', sans-serif;
            opacity: 0; transition: opacity 0.3s;
            z-index: 100; white-space: nowrap;
        }
        #toast.show { opacity: 1; }
        #toast.error { border-color: #ef4444; color: #ef4444; }
        #toast.success { border-color: var(--arena-gold); color: var(--arena-gold); }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 8px rgba(251,191,36,0.3); }
            50% { box-shadow: 0 0 25px rgba(251,191,36,0.7); }
        }
        .slot-filled { animation: pulse-glow 2.5s ease-in-out infinite; }
        @keyframes arena-unlock {
            0% { box-shadow: 0 0 0 0 rgba(251,191,36,0.6); }
            70% { box-shadow: 0 0 0 20px rgba(251,191,36,0); }
            100% { box-shadow: 0 0 0 0 rgba(251,191,36,0); }
        }
        .arena-open { animation: arena-unlock 1s ease-out 3; }
    </style>
</head>
