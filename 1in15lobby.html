
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1in15 Lobby | Chicken League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --arena-red: #ef4444;
            --arena-glow: rgba(239, 68, 68, 0.5);
            --bg-dark: #050505;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(239, 68, 68, 0.05) 0%, transparent 70%);
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ── Slot Grid ── */
        .slot-circle {
            width: 56px; height: 56px;
            border-radius: 50%;
            border: 2px dashed rgba(255,255,255,0.12);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.01);
            position: relative;
            flex-shrink: 0;
        }

        .slot-filled {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--arena-red);
            box-shadow: 0 0 20px var(--arena-glow);
            transform: scale(1.08);
            border-style: solid;
        }

        .slot-mine {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            box-shadow: 0 0 28px rgba(255,255,255,0.3);
            transform: scale(1.12);
        }

        /* ── Countdown Ring ── */
        .countdown-ring {
            position: relative;
            width: 110px; height: 110px;
            margin: 0 auto;
        }

        .countdown-ring svg {
            transform: rotate(-90deg);
            position: absolute; top: 0; left: 0;
        }

        .countdown-ring .ring-bg {
            fill: none;
            stroke: rgba(255,255,255,0.05);
            stroke-width: 5;
        }

        .countdown-ring .ring-fill {
            fill: none;
            stroke: var(--arena-red);
            stroke-width: 5;
            stroke-linecap: round;
            stroke-dasharray: 314;
            stroke-dashoffset: 314;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 6px var(--arena-red));
        }

        .countdown-ring .ring-text {
            position: absolute;
            inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* ── Code Input ── */
        .code-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            color: white;
            letter-spacing: 0.3em;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .code-input:focus {
            border-color: var(--arena-red);
            box-shadow: 0 0 20px rgba(239,68,68,0.2);
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px; border-radius: 12px;
            font-size: 11px; font-weight: bold; letter-spacing: 0.1em;
            font-family: 'Orbitron', sans-serif;
            opacity: 0; transition: opacity 0.3s;
            z-index: 100; white-space: nowrap;
        }
        #toast.show { opacity: 1; }
        #toast.error { border-color: #ef4444; color: #ef4444; }
        #toast.success { border-color: var(--arena-red); color: var(--arena-red); }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 8px rgba(239,68,68,0.3); }
            50% { box-shadow: 0 0 25px rgba(239,68,68,0.7); }
        }
        .slot-filled { animation: pulse-glow 2.5s ease-in-out infinite; }

        @keyframes arena-unlock {
            0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); }
            70% { box-shadow: 0 0 0 20px rgba(239,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
        }
        .arena-open { animation: arena-unlock 1s ease-out 3; }
    </style>
</head>
<body class="pb-16">

    <div id="debug-status" class="fixed bottom-4 left-4 right-4 z-50 text-[8px] orbitron text-zinc-600 bg-black/80 p-2 rounded border border-white/5 pointer-events-none text-center">
        HANDSHAKE: INITIALIZING...
    </div>

    <div id="toast"></div>

    <div id="code-gate" class="fixed inset-0 z-40 flex items-center justify-center p-6" style="background: rgba(5,5,5,0.97);">
        <div class="glass-panel rounded-[2rem] p-8 w-full max-w-sm text-center">
            <h2 class="orbitron text-lg font-black uppercase tracking-tighter mb-1">League Access</h2>
            <p class="text-zinc-500 text-[10px] orbitron tracking-widest mb-6">ENTER SECRET CODE TO JOIN</p>
            <input id="secret-code-input" type="text" maxlength="8" placeholder="XXXXXXXX" class="code-input w-full px-4 py-4 rounded-xl mb-4" />
            <button id="code-submit-btn" onclick="verifySecretCode()" class="w-full py-4 bg-red-600 text-white rounded-2xl font-black uppercase italic tracking-tighter text-sm transition-all active:scale-95">
                VERIFY & ENTER
            </button>
        </div>
    </div>

    <main class="max-w-md mx-auto p-5" id="main-lobby" style="display:none;">
        <div class="mt-4 mb-5 flex items-center justify-between">
            <button onclick="exitLobby()" class="text-gray-600 text-[10px] font-black uppercase tracking-widest hover:text-white orbitron">← EXIT</button>
            <div id="connection-indicator" class="flex items-center gap-2 px-3 py-1 bg-red-500/10 rounded-full">
                <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                <span class="text-[9px] font-bold text-red-500 orbitron">DISCONNECTED</span>
            </div>
        </div>

        <div class="glass-panel rounded-[2rem] overflow-hidden mb-5">
            <div class="h-28 bg-cover bg-center" style="background-image: url('https://i.ibb.co/qYSmTyxm/IMG-2414.png'); opacity: 0.6;"></div>
            <div class="p-5 flex items-center justify-between">
                <div>
                    <h1 class="text-lg font-black italic uppercase orbitron tracking-tighter">Broiler Championship</h1>
                    <p class="text-zinc-500 text-[9px] font-bold uppercase tracking-[0.2em] mt-0.5">15-Player Arena · Chicken League</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-zinc-500 orbitron">PRIZE</p>
                    <p class="text-red-500 font-black orbitron text-sm">🐔 1 BROILER</p>
                </div>
            </div>
        </div>

        <div class="glass-panel p-5 rounded-[2rem] mb-5 text-center">
            <p class="text-[9px] orbitron text-zinc-500 uppercase tracking-widest mb-4" id="timer-label">WAITING FOR LOBBY TO FILL</p>
            <div class="countdown-ring mb-3">
                <svg width="110" height="110" viewBox="0 0 110 110">
                    <circle class="ring-bg" cx="55" cy="55" r="50"/>
                    <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"/>
                </svg>
                <div class="ring-text">
                    <span id="countdown-display" class="orbitron text-2xl font-black text-red-500">--:--</span>
                    <span class="text-[8px] text-zinc-500 orbitron mt-0.5">ARENA OPENS</span>
                </div>
            </div>
            <div id="count_display" class="orbitron text-[10px] text-red-500 font-black tracking-widest">SYNCING...</div>
        </div>

        <div class="glass-panel p-5 rounded-[2rem] mb-5">
            <h3 class="text-[9px] font-black uppercase tracking-widest text-zinc-500 orbitron mb-4">Arena Registry — 15 Slots</h3>
            <div class="grid grid-cols-5 gap-3" id="slots-grid"></div>
        </div>

        <button id="mainBtn" onclick="handleMainAction()" class="w-full py-5 bg-zinc-900 text-zinc-600 rounded-2xl font-black uppercase italic tracking-tighter orbitron" disabled>
            STARTING SYSTEM...
        </button>
    </main>

    <script>
        const SB_URL = 'https://tbvmgcknkwsucstedigd.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Truncated for brevity
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        const LOBBY_ID = '1in15';
        const MAX_SLOTS = 15;

        let currentUser = localStorage.getItem('league_user') || "PILOT_" + Math.random().toString(36).substring(2, 7).toUpperCase();
        localStorage.setItem('league_user', currentUser);

        let cachedPlayers = [], cachedSignal = null, isProcessing = false, countdownTimer = null;

        async function verifySecretCode() {
            const input = document.getElementById('secret-code-input').value.trim().toUpperCase();
            if (!input) return;
            const { data } = await sb.from('lobby_signals').select('*').eq('lobby_id', LOBBY_ID).eq('secret_code', input).maybeSingle();
            if (data) {
                localStorage.setItem('league_code_' + LOBBY_ID, input);
                document.getElementById('code-gate').style.display = 'none';
                document.getElementById('main-lobby').style.display = 'block';
                syncLobby();
            }
        }

        async function syncLobby() {
            const [{ data: players }, { data: signal }] = await Promise.all([
                sb.from('lobby_players').select('*').eq('lobby_id', LOBBY_ID).order('joined_at', { ascending: true }),
                sb.from('lobby_signals').select('*').eq('lobby_id', LOBBY_ID).maybeSingle()
            ]);
            cachedPlayers = players || [];
            cachedSignal = signal;
            updateUI();
        }

        function updateUI() {
            const total = cachedPlayers.length;
            const isIn = cachedPlayers.some(p => p.player_username === currentUser);
            const grid = document.getElementById('slots-grid');
            grid.innerHTML = '';
            
            for (let i = 0; i < MAX_SLOTS; i++) {
                const p = cachedPlayers[i];
                const slot = document.createElement('div');
                slot.className = `slot-circle ${p ? (p.player_username === currentUser ? 'slot-mine' : 'slot-filled') : ''}`;
                slot.innerHTML = p ? `<span class="orbitron font-black">${p.player_username[0]}</span>` : '+';
                grid.appendChild(slot);
            }
            document.getElementById('count_display').innerText = `${total} / ${MAX_SLOTS} PLAYERS`;
        }

        async function handleMainAction() {
            if (isProcessing) return;
            const { error } = await sb.from('lobby_players').insert([{ lobby_id: LOBBY_ID, player_username: currentUser }]);
            if (!error) syncLobby();
        }

        sb.channel('1in15_lobby').on('postgres_changes', { event: '*', schema: 'public', table: 'lobby_players' }, syncLobby).subscribe();
        if (localStorage.getItem('league_code_' + LOBBY_ID)) {
            document.getElementById('code-gate').style.display = 'none';
            document.getElementById('main-lobby').style.display = 'block';
            syncLobby();
        }
    </script>
</body>
</html>
