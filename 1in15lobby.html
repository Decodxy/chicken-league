<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1in15 Lobby | Chicken League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue:      #2563eb;
            --blue-lt:   #3b82f6;
            --blue-glow: rgba(37,99,235,0.35);
            --black:     #0a0a0a;
            --eerie:     #111111;
            --surface:   #181818;
            --card:      #1e1e1e;
            --border:    #2a2a2a;
            --white:     #ffffff;
            --grey:      #666666;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Syne', sans-serif;
            min-height: 100dvh;
            overflow-x: hidden;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(37,99,235,0.07) 0%, transparent 60%);
        }
        .orbitron { font-family: 'Orbitron', monospace; }

        /* ── Page header ── */
        #page-header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            transition: border-color 0.15s, background 0.15s;
            text-decoration: none;
            color: inherit;
        }
        .header-action:hover { border-color: var(--blue); background: rgba(37,99,235,0.08); }
        .header-action svg { width: 20px; height: 20px; }
        .header-action span {
            font-family: 'Orbitron', monospace;
            font-size: 0.5rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--grey);
            text-transform: uppercase;
            white-space: nowrap;
        }
        .header-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }
        .header-brand .eyebrow {
            font-family: 'Orbitron', monospace;
            font-size: 0.5rem;
            letter-spacing: 0.25em;
            color: var(--blue-lt);
            text-transform: uppercase;
        }
        .header-brand .name {
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
            font-weight: 900;
            color: var(--white);
            letter-spacing: 0.05em;
        }

        /* ── Glass card ── */
        .glass-panel {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 24px;
        }

        /* ── Code gate page ── */
        #code-gate-page {
            min-height: calc(100dvh - 57px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px 40px;
            gap: 0;
        }

        /* ── Access card ── */
        #access-card {
            width: 100%;
            max-width: 380px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px 28px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 0 60px rgba(37,99,235,0.06);
        }
        .access-icon {
            width: 56px; height: 56px;
            border-radius: 16px;
            background: rgba(37,99,235,0.1);
            border: 1px solid rgba(37,99,235,0.25);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 18px;
        }
        .access-eyebrow {
            font-family: 'Orbitron', monospace;
            font-size: 0.55rem;
            letter-spacing: 0.25em;
            color: var(--blue-lt);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .access-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--white);
            letter-spacing: -0.01em;
            margin-bottom: 4px;
        }
        .access-sub {
            font-size: 0.68rem;
            color: var(--grey);
            font-family: 'Orbitron', monospace;
            letter-spacing: 0.15em;
            margin-bottom: 24px;
        }

        /* ── Code input ── */
        .code-input {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--white);
            letter-spacing: 0.3em;
            text-align: center;
            font-family: 'Orbitron', monospace;
            font-size: 1.05rem;
            text-transform: uppercase;
            outline: none;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .code-input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }
        .code-input::placeholder { color: rgba(255,255,255,0.15); }

        /* ── Buttons ── */
        .btn-blue {
            width: 100%;
            padding: 14px;
            background: var(--blue);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', monospace;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 20px var(--blue-glow);
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
        }
        .btn-blue:hover { background: var(--blue-lt); box-shadow: 0 0 28px var(--blue-glow); }
        .btn-blue:active { transform: scale(0.98); }

        .btn-loading { position: relative; pointer-events: none; opacity: 0.6; }
        .btn-loading::after {
            content: "";
            position: absolute;
            width: 16px; height: 16px;
            top: 0; left: 0; right: 0; bottom: 0; margin: auto;
            border: 2px solid transparent;
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        /* ── Get code CTA — sits BELOW the card like a sign-up prompt ── */
        #get-code-row {
            width: 100%;
            max-width: 380px;
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .divider-line {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .divider-line::before,
        .divider-line::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider-line span {
            font-family: 'Orbitron', monospace;
            font-size: 0.55rem;
            color: var(--grey);
            letter-spacing: 0.15em;
            white-space: nowrap;
        }
        .get-code-box {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            text-decoration: none;
            transition: border-color 0.15s, background 0.15s;
        }
        .get-code-box:hover {
            border-color: #25d366;
            background: rgba(37,211,102,0.05);
        }
        .get-code-box .gcb-left { display: flex; align-items: center; gap: 12px; }
        .gcb-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: rgba(37,211,102,0.1);
            border: 1px solid rgba(37,211,102,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0;
        }
        .gcb-text .gcb-title {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 2px;
        }
        .gcb-text .gcb-sub {
            font-family: 'Orbitron', monospace;
            font-size: 0.58rem;
            color: var(--grey);
            letter-spacing: 0.08em;
        }
        .gcb-arrow {
            font-size: 1rem;
            color: #25d366;
            flex-shrink: 0;
        }

        /* ── Main lobby ── */
        #main-lobby { display: none; }
        .lobby-inner { max-width: 440px; margin: 0 auto; padding: 16px 16px 40px; display: flex; flex-direction: column; gap: 14px; }

        /* ── Connection pill ── */
        #connection-indicator {
            display: flex; align-items: center; gap-6px;
            padding: 5px 10px; border-radius: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 0.58rem; font-weight: 700;
            letter-spacing: 0.1em;
            border: 1px solid rgba(239,68,68,0.25);
            background: rgba(239,68,68,0.08);
            color: #ef4444;
            gap: 6px;
        }
        #connection-indicator.live {
            border-color: rgba(34,197,94,0.25);
            background: rgba(34,197,94,0.08);
            color: #4ade80;
        }

        /* ── Hero card ── */
        .hero-img {
            height: 90px; border-radius: 16px 16px 0 0;
            background: url('https://i.ibb.co/qYSmTyxm/IMG-2414.png') center/cover;
            opacity: 0.5;
        }
        .hero-body {
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* ── Countdown ring ── */
        .countdown-ring { position: relative; width: 100px; height: 100px; margin: 0 auto; }
        .countdown-ring svg { transform: rotate(-90deg); position: absolute; top: 0; left: 0; }
        .ring-bg   { fill: none; stroke: rgba(255,255,255,0.04); stroke-width: 5; }
        .ring-fill {
            fill: none; stroke: var(--blue); stroke-width: 5; stroke-linecap: round;
            stroke-dasharray: 283; stroke-dashoffset: 283;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 5px var(--blue));
        }
        .ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* ── Slot circles ── */
        .slot-circle {
            width: 48px; height: 48px; border-radius: 50%;
            border: 2px dashed rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.01);
            transition: all 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
            flex-shrink: 0;
        }
        .slot-filled {
            background: rgba(37,99,235,0.12);
            border: 2px solid var(--blue);
            box-shadow: 0 0 16px var(--blue-glow);
            transform: scale(1.08);
            animation: pulse-blue 2.5s ease-in-out infinite;
        }
        .slot-mine {
            background: rgba(255,255,255,0.08);
            border: 2px solid var(--white);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transform: scale(1.12);
        }

        /* ── Main action button ── */
        #mainBtn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-family: 'Orbitron', monospace;
            font-size: 0.82rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--grey);
            transition: all 0.15s;
        }

        /* ── Toast ── */
        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--surface); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 12px;
            font-family: 'Orbitron', monospace; font-size: 0.65rem;
            font-weight: 700; letter-spacing: 0.1em;
            opacity: 0; transition: opacity 0.3s; z-index: 100; white-space: nowrap;
        }
        #toast.show   { opacity: 1; }
        #toast.error   { border-color: #ef4444; color: #ef4444; }
        #toast.success { border-color: var(--blue-lt); color: var(--blue-lt); }

        /* ── Share sheet ── */
        #share-sheet {
            position: fixed; inset: 0; z-index: 60;
            background: rgba(10,10,10,0.88);
            display: none; align-items: flex-end; justify-content: center;
        }
        #share-sheet.open { display: flex; }
        #share-inner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px 24px 0 0;
            padding: 8px 0 0;
            width: 100%; max-width: 440px;
            animation: slideup 0.25s ease;
        }
        .sheet-pill {
            width: 36px; height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 20px;
        }
        .sheet-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.6rem;
            color: var(--grey);
            letter-spacing: 0.2em;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 16px;
            padding: 0 20px;
        }
        .share-opt {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 20px;
            cursor: pointer;
            border-top: 1px solid var(--border);
            transition: background 0.12s;
        }
        .share-opt:hover { background: rgba(255,255,255,0.03); }
        .share-opt-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .share-opt-label { font-size: 0.82rem; font-weight: 700; color: var(--white); }
        .share-opt-sub { font-family: 'Orbitron', monospace; font-size: 0.58rem; color: var(--grey); letter-spacing: 0.05em; margin-top: 2px; }
        .sheet-cancel {
            display: block; width: 100%;
            padding: 16px;
            background: none; border: none; border-top: 1px solid var(--border);
            font-family: 'Orbitron', monospace; font-size: 0.65rem; font-weight: 700;
            letter-spacing: 0.12em; color: var(--grey); cursor: pointer;
            transition: color 0.12s;
        }
        .sheet-cancel:hover { color: var(--white); }

        /* ── Animations ── */
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse-blue {
            0%,100% { box-shadow: 0 0 8px rgba(37,99,235,0.3); }
            50%      { box-shadow: 0 0 20px rgba(37,99,235,0.65); }
        }
        @keyframes arena-unlock {
            0%   { box-shadow: 0 0 0 0 rgba(37,99,235,0.6); }
            70%  { box-shadow: 0 0 0 20px rgba(37,99,235,0); }
            100% { box-shadow: 0 0 0 0 rgba(37,99,235,0); }
        }
        .arena-open { animation: arena-unlock 1s ease-out 3; }
        @keyframes slideup {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }
        @keyframes fadein {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadein 0.3s ease forwards; }
    </style>
</head>
<body>

<div id="toast"></div>
