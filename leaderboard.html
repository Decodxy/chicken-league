<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leaderboards | Chicken League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --arena-gold: #fbbf24; --bg-dark: #050505; }
    body {
      background: var(--bg-dark); color: white; font-family: 'Inter', sans-serif;
      min-height: 100vh; overflow-x: hidden; padding-bottom: 90px;
      background-image: radial-gradient(circle at 50% 20%, rgba(251,191,36,0.04) 0%, transparent 60%);
    }
    .orbitron { font-family: 'Orbitron', sans-serif; }
    .league-card {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 18px 20px;
      text-decoration: none; color: white;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      animation: cardIn 0.3s ease-out both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .league-card:hover  { border-color: rgba(251,191,36,0.35); background: rgba(251,191,36,0.04); }
    .league-card:active { transform: scale(0.97); }
    .league-icon {
      width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.25);
    }
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
      border-radius: 20px; height: 84px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    #bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
      display: flex; justify-content: space-around; align-items: center;
      padding: 10px 16px 18px;
      background: rgba(8,8,8,0.92); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-decoration: none; color: rgba(255,255,255,0.3);
      font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      transition: color 0.2s, transform 0.2s; padding: 4px 20px; border-radius: 12px;
    }
    .nav-item:active { transform: scale(0.92); }
    .nav-item.active { color: #fbbf24; }
    .nav-item.active svg { stroke: #fbbf24; filter: drop-shadow(0 0 6px rgba(251,191,36,0.5)); }
  </style>
</head>
<body>

  <div class="max-w-md mx-auto px-5 pt-10">
    <div class="mb-8">
      <p class="orbitron text-[9px] text-yellow-400 tracking-widest font-bold mb-1">CHICKEN LEAGUE</p>
      <h1 class="orbitron text-3xl font-black uppercase tracking-tighter">Leaderboards</h1>
      <p class="text-zinc-500 text-[10px] mt-1">Live rankings — auto-updates when arenas go live</p>
    </div>

    <div id="league-list" class="flex flex-col gap-3">
      <div class="skeleton"></div>
      <div class="skeleton" style="opacity:0.5"></div>
    </div>

    <p id="empty-msg" class="hidden text-center text-zinc-600 orbitron text-[10px] tracking-widest mt-16">NO ACTIVE LEAGUES RIGHT NOW</p>
  </div>

  <nav id="bottom-nav">
    <a href="dashboard.html" class="nav-item" data-page="dashboard">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12L12 3l9 9M4 10v10a1 1 0 001 1h5v-6h4v6h5a1 1 0 001-1V10"/></svg>
      <span>Home</span>
    </a>
    <a href="lobby.html" class="nav-item" data-page="lobby">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-5.356-3.765M9 20H4v-2a4 4 0 015.356-3.765M15 7a4 4 0 11-8 0 4 4 0 018 0zm6 3a3 3 0 11-6 0 3 3 0 016 0zm-18 0a3 3 0 116 0 3 3 0 01-6 0z"/></svg>
      <span>Lobbies</span>
    </a>
    <a href="leaderboard.html" class="nav-item active" data-page="leaderboard">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      <span>Ranks</span>
    </a>
  </nav>

  <script>
    const SB_URL = 'https://tbvmgcknkwsucstedigd.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRidm1nY2tua3dzdWNzdGVkaWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5ODgwMjQsImV4cCI6MjA4MzU2NDAyNH0.OhfvqWaGLwNvIJq8TBDomdtKWDII5MvC6zhKKJBUD9Q';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    // ── League display config — add new leagues here ──────────────────────
    const LEAGUE_META = {
      '1in15': {
        emoji:    '🐔',
        file:     '1in15leaderboard.html',
        subtitle: '15 PLAYERS · 1 WINNER',
        prize:    '🐔 1 BROILER CHICKEN',
      },
      '10in200': {
        emoji:    '🏆',
        file:     '10in200leaderboard.html',
        subtitle: '200 PLAYERS · TOP 10 WIN',
        prize:    '🐔 × 10 BROILER CHICKENS',
      },
    };

    function getMeta(id, field, fallback) {
      return LEAGUE_META[id]?.[field] ?? fallback;
    }

    function renderLeagues(leagues) {
      const list  = document.getElementById('league-list');
      const empty = document.getElementById('empty-msg');
      list.innerHTML = '';

      if (!leagues.length) {
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      leagues.forEach((league, idx) => {
        const card = document.createElement('a');
        card.href      = getMeta(league.id, 'file', `${league.id}leaderboard.html`);
        card.className = 'league-card';
        card.style.animationDelay = `${idx * 60}ms`;
        card.innerHTML = `
          <div class="flex items-center gap-4">
            <div class="league-icon">${getMeta(league.id, 'emoji', '🏆')}</div>
            <div>
              <p class="orbitron font-black text-sm tracking-tight">${league.league_name}</p>
              <p class="text-zinc-500 text-[9px] orbitron tracking-widest mt-0.5">
                CHICKEN LEAGUE · ${getMeta(league.id, 'subtitle', 'LEAGUE')}
              </p>
              <p class="text-yellow-400/70 text-[8px] orbitron mt-0.5">
                PRIZE: ${getMeta(league.id, 'prize', '—')}
              </p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span>
            <span class="text-[9px] orbitron text-green-400 font-bold">LIVE</span>
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.3)" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
          </div>`;
        list.appendChild(card);
      });
    }

    async function loadLeagues() {
      const { data, error } = await sb
        .from('leagues_registry')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) return;

      const now = new Date();
      // Show leagues that are either:
      // (a) explicitly marked is_active = true by admin   — "open arena now" or countdown auto-flip
      // (b) have a start_time that has already passed      — timer-based auto-detection (even if admin's browser closed)
      const active = (data || []).filter(l =>
        l.is_active || (l.start_time && new Date(l.start_time) <= now)
      );

      renderLeagues(active);
    }

    // ── Realtime: re-render on any leagues_registry change ─────────────────
    sb.channel('leaderboard-hub')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'leagues_registry' }, loadLeagues)
      .subscribe();

    // ── Poll every 30s to auto-detect timer-based start_time passing ───────
    // (handles case where admin's browser was closed before timer fired)
    setInterval(loadLeagues, 30_000);

    loadLeagues();

    // Active page highlight
    (function() {
      const page = location.pathname.split('/').pop().replace('.html','') || 'dashboard';
      const el = document.querySelector(`#bottom-nav [data-page="${page}"]`);
      if (el) el.classList.add('active');
    })();
  </script>
</body>
</html>
