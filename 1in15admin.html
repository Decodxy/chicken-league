<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Chicken League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #131314;
            color: white;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    
    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-white mb-2">ADMIN DASHBOARD</h1>
            <p class="text-sm text-gray-400">Chicken League Control Center</p>
        </div>

        <!-- Admin Control Cards -->
        <div class="space-y-4">
            
            <!-- 1in15 Admin Card -->
            <a href="1in15admin.html" class="block bg-[#1a1a1b] border-2 border-[#4285F4] rounded-lg p-6 hover:bg-[#222223] transition-all duration-200 hover:scale-105">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold text-white mb-1">1 IN 15 ARENA</h2>
                        <p class="text-sm text-gray-400">15-player match control</p>
                    </div>
                    <svg class="w-8 h-8 text-[#4285F4]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </div>
            </a>

            <!-- 10in200 Admin Card -->
            <a href="10in200admin.html" class="block bg-[#1a1a1b] border-2 border-[#4285F4] rounded-lg p-6 hover:bg-[#222223] transition-all duration-200 hover:scale-105">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold text-white mb-1">10 IN 200 ARENA</h2>
                        <p class="text-sm text-gray-400">10-player match control</p>
                    </div>
                    <svg class="w-8 h-8 text-[#4285F4]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </div>
            </a>

            <!-- Future Games Placeholder -->
            <div class="bg-[#1a1a1b] border-2 border-gray-700 rounded-lg p-6 opacity-50 cursor-not-allowed">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold text-gray-500 mb-1">COMING SOON</h2>
                        <p class="text-sm text-gray-600">More game modes</p>
                    </div>
                    <svg class="w-8 h-8 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
            </div>

        </div>

        <!-- Quick Stats -->
        <div class="mt-8 bg-[#1a1a1b] border border-gray-700 rounded-lg p-4">
            <h3 class="text-sm font-bold text-gray-400 mb-3">SYSTEM STATUS</h3>
            <div class="grid grid-cols-2 gap-4 text-center">
                <div>
                    <p class="text-2xl font-black text-[#4285F4]" id="activeGames">--</p>
                    <p class="text-xs text-gray-500">Active Games</p>
                </div>
                <div>
                    <p class="text-2xl font-black text-white" id="totalPlayers">--</p>
                    <p class="text-xs text-gray-500">Total Players</p>
                </div>
            </div>
        </div>

        <!-- Sign Out Button -->
        <button onclick="signOut()" class="w-full mt-6 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition-colors duration-200">
            SIGN OUT
        </button>

    </div>

    <script>
        // Quick stats loader
        async function loadStats() {
            try {
                const SUPABASE_URL = 'https://tbvmgcknkwsucstedigd.supabase.co';
                const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRidm1nY2tua3dzdWNzdGVkaWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzcwNDQwMjgsImV4cCI6MjA1MjYyMDAyOH0.zthxq26pKWU0Zk_2hTwvvGDEZF98D8QWUKdH6A2ZcOw';

                // Get active games count
                const gamesRes = await fetch(`${SUPABASE_URL}/rest/v1/leagues_registry?is_active=eq.true&select=count`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                const gamesData = await gamesRes.json();
                document.getElementById('activeGames').textContent = gamesData.length || 0;

                // Get total players count
                const playersRes = await fetch(`${SUPABASE_URL}/rest/v1/Profiles?select=count`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Prefer': 'count=exact'
                    }
                });
                const count = playersRes.headers.get('Content-Range')?.split('/')[1] || 0;
                document.getElementById('totalPlayers').textContent = count;

            } catch (error) {
                console.error('Stats load error:', error);
            }
        }

        function signOut() {
            if (confirm('Sign out of admin dashboard?')) {
                localStorage.removeItem('admin_auth');
                window.location.href = 'index.html';
            }
        }

        // Load stats on page load
        loadStats();
    </script>

</body>
</html>
