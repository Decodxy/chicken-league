<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Center | Chicken League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="security-bridge.js"></script>
    <script src="ui-bridge.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Product+Sans:wght@400;700;900&display=swap');
        :root {
            --gemini-bg: #131314;
            --gemini-blue: #4285F4;
            --text-white: #ffffff;
            --ui-font: 'Product Sans', 'Google Sans', system-ui, sans-serif;
        }
        body {
            background-color: var(--gemini-bg);
            color: var(--text-white);
            font-family: var(--ui-font);
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .font-bold-900 { font-weight: 900; letter-spacing: -0.02em; }
        .glass-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.25rem;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        .glass-card:active {
            background: rgba(255,255,255,0.06);
            border-color: var(--gemini-blue);
        }
        .active-blue { border-left: 4px solid var(--gemini-blue); }
        .text-blue   { color: var(--gemini-blue); }
        .bg-blue     { background-color: var(--gemini-blue); }
        .status-pulse {
            width: 8px; height: 8px;
            border-radius: 50%;
            background-color: var(--gemini-blue);
        }
    </style>
</head>
<body class="pt-16">
    <main class="px-6">
        <div class="flex justify-between items-start mb-10">
            <div>
                <p class="text-[10px] font-black uppercase tracking-[0.2em] mb-2 text-blue">System: Optimized</p>
                <h1 class="text-3xl font-bold-900 uppercase tracking-tighter leading-tight">CONTROL<br>CENTER</h1>
            </div>
            <div class="h-12 w-12 rounded-2xl bg-white flex items-center justify-center shadow-lg shadow-blue-500/10">
                <span id="user_initial" class="font-black text-black text-xl">?</span>
            </div>
        </div>

      

            <a href="1in15lobby.html" class="glass-card p-6 flex items-center justify-between active-blue">
                <div class="flex items-center gap-5">
                    <div class="h-14 w-14 rounded-xl bg-blue flex items-center justify-center text-white font-black text-2xl shadow-blue-500/20 shadow-lg">15</div>
                    <div>
                        <h3 class="font-bold-900 text-lg uppercase">Mega Brawl</h3>
                        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest">1 IN 15 • High Yield</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <div class="status-pulse animate-ping"></div>
                    <span class="text-blue font-black text-[9px] uppercase tracking-widest">Open</span>
                </div>
            </a>

        
    </main>

    <script src="nav.js"></script>
    <script>
        async function load() {
            try {
                const { data: { session } } = await sb.auth.getSession();
                if (session && session.user && session.user.user_metadata) {
                    const username = session.user.user_metadata.username || "P";
                    document.getElementById('user_initial').innerText = username.charAt(0).toUpperCase();
                }
            } catch(e) { console.error("Neural Sync Error", e); }
        }
        load();
    </script>
</body>
</html>
