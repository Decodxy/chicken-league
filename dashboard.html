<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Center | Chicken League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="security-bridge.js"></script>
    <script src="ui-bridge.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Product+Sans:wght@400;700;900&display=swap');
        
        :root {
            --gemini-bg: #131314;
            --gemini-blue: #4285F4;
            --text-white: #ffffff;
            --ui-font: 'Product Sans', 'Google Sans', system-ui, sans-serif;
            --heading-font: 'Orbitron', monospace;
        }
        
        body {
            background-color: var(--gemini-bg);
            color: var(--text-white);
            font-family: var(--ui-font);
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        
        .font-bold-900 { font-weight: 900; letter-spacing: -0.02em; }
        .font-heading { font-family: var(--heading-font); font-weight: 900; }
        
        .glass-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.25rem;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        
        .glass-card:active {
            background: rgba(255,255,255,0.06);
            border-color: var(--gemini-blue);
        }
        
        .feature-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 2rem 1rem;
            text-decoration: none;
            color: var(--text-white);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            border-radius: 1.25rem;
            cursor: pointer;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .feature-block:active {
            transform: scale(0.95);
        }
        
        .feature-icon-wrapper {
            width: 100px;
            height: 100px;
            border-radius: 1.5rem;
            background: rgba(66, 133, 244, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        
        .feature-block:active .feature-icon-wrapper {
            background: rgba(66, 133, 244, 0.25);
            box-shadow: 0 0 20px rgba(66, 133, 244, 0.3);
        }
        
        .feature-icon {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .feature-label {
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.01em;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .text-blue { color: var(--gemini-blue); }
        .bg-blue { background-color: var(--gemini-blue); }
    </style>
</head>
<body class="pt-16">
    <main class="px-6 pb-20">
        <!-- Header -->
        <div class="flex justify-between items-start mb-12">
            <div>
                <p class="text-[10px] font-black uppercase tracking-[0.2em] mb-2 text-blue">System: Ready</p>
                <h1 class="text-4xl font-heading uppercase tracking-tighter leading-tight">Dashboard</h1>
            </div>
            <div class="h-12 w-12 rounded-2xl bg-white flex items-center justify-center shadow-lg shadow-blue-500/10">
                <span id="user_initial" class="font-black text-black text-xl">?</span>
            </div>
        </div>

        <!-- Feature Grid -->
        <div class="grid-container">
            <!-- Gaming -->
            <a href="tryyourluck.html" class="feature-block">
                <div class="feature-icon-wrapper">
                    <div class="feature-icon">
                        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <!-- Game Controller Icon -->
                            <rect x="8" y="18" width="48" height="28" rx="6" fill="#4285F4"/>
                            <circle cx="18" cy="26" r="2.5" fill="#131314"/>
                            <circle cx="18" cy="34" r="2.5" fill="#131314"/>
                            <circle cx="12" cy="30" r="2.5" fill="#131314"/>
                            <circle cx="24" cy="30" r="2.5" fill="#131314"/>
                            <circle cx="46" cy="26" r="2.5" fill="#131314"/>
                            <circle cx="46" cy="34" r="2.5" fill="#131314"/>
                            <circle cx="52" cy="30" r="2.5" fill="#131314"/>
                            <circle cx="40" cy="30" r="2.5" fill="#131314"/>
                        </svg>
                    </div>
                </div>
                <span class="feature-label">Gaming</span>
            </a>

            <!-- Empire Dine -->
            <a href="empiredine.html" class="feature-block">
                <div class="feature-icon-wrapper">
                    <div class="feature-icon">
                        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <!-- Restaurant Icon -->
                            <path d="M20 12C20 10 21.8 8 24 8C26.2 8 28 10 28 12V44C28 46.2 26.2 48 24 48C21.8 48 20 46.2 20 44V12Z" fill="#4285F4"/>
                            <path d="M36 14C36 12 37.8 10 40 10C42.2 10 44 12 44 14V44C44 46.2 42.2 48 40 48C37.8 48 36 46.2 36 44V14Z" fill="#4285F4"/>
                            <rect x="12" y="24" width="8" height="20" rx="1" fill="#4285F4" opacity="0.7"/>
                            <rect x="44" y="26" width="8" height="18" rx="1" fill="#4285F4" opacity="0.7"/>
                        </svg>
                    </div>
                </div>
                <span class="feature-label">Empire Dine</span>
            </a>
        </div>

        <!-- Coming Soon Section -->
        <div class="glass-card p-6 text-center">
            <p class="text-zinc-500 text-[12px] font-bold uppercase tracking-widest mb-2">More Features</p>
            <p class="text-sm text-zinc-400">Additional experiences coming soon</p>
        </div>
    </main>

    <script src="nav.js"></script>
    <script>
        async function load() {
            try {
                const { data: { session } } = await sb.auth.getSession();
                if (session && session.user && session.user.user_metadata) {
                    const username = session.user.user_metadata.username || "P";
                    document.getElementById('user_initial').innerText = username.charAt(0).toUpperCase();
                }
            } catch(e) { console.error("Neural Sync Error", e); }
        }
        load();
    </script>
</body>
</html>
