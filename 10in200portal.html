<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Easter Championship Access | Chicken League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue:      #2563eb;
            --blue-lt:   #3b82f6;
            --blue-glow: rgba(37,99,235,0.35);
            --black:     #0a0a0a;
            --surface:   #181818;
            --card:      #1c1c1c;
            --border:    #272727;
            --white:     #ffffff;
            --grey:      #666666;
            --dim:       #3a3a3a;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Syne', sans-serif;
            min-height: 100dvh;
            overflow-x: hidden;
        }
        .orbitron { font-family: 'Orbitron', monospace; }

        .glass-panel {
            background: rgba(255,255,255,0.025);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
        }

        /* ── Page header ── */
        #page-header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-center {
            font-family: 'Orbitron', monospace;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            color: var(--white);
        }
        .header-center span { color: var(--blue-lt); }

        /* ── Corner action buttons ── */
        .corner-btn {
            position: fixed;
            top: 12px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(10,10,10,0.82);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 40px;
            padding: 9px 16px;
            cursor: pointer;
            transition: background 0.18s, border-color 0.18s, transform 0.15s;
            font-family: 'Orbitron', monospace;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.07em;
            color: var(--grey);
            text-decoration: none;
            white-space: nowrap;
        }
        .corner-btn:hover {
            background: rgba(37,99,235,0.18);
            border-color: var(--blue);
            color: var(--white);
            transform: translateY(-1px);
        }
        .corner-btn:active { transform: scale(0.95); }
        .corner-btn svg { flex-shrink: 0; }
        #btn-invite   { left: 12px; }
        #btn-practice { right: 12px; }

        /* ── Code input ── */
        .code-input {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--white);
            letter-spacing: 0.3em; text-align: center;
            font-family: 'Orbitron', monospace;
            font-size: 1.05rem; text-transform: uppercase; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
        }
        .code-input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }
        .code-input::placeholder { color: rgba(255,255,255,0.15); letter-spacing: 0.2em; }

        /* ── Buttons ── */
        .btn-blue {
            background: var(--blue);
            color: var(--white);
            border: none;
            box-shadow: 0 0 18px var(--blue-glow);
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            cursor: pointer;
        }
        .btn-blue:hover { background: var(--blue-lt); box-shadow: 0 0 26px var(--blue-glow); }
        .btn-blue:active { transform: scale(0.97); }
        .btn-loading { position: relative; pointer-events: none; opacity: 0.65; }
        .btn-loading::after {
            content: ""; position: absolute;
            width: 16px; height: 16px;
            top: 0; left: 0; right: 0; bottom: 0; margin: auto;
            border: 2px solid transparent; border-top-color: var(--white);
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }

        /* ── Toast ── */
        #toast {
            position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
            background: var(--card); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 12px;
            font-size: 11px; font-weight: bold; letter-spacing: 0.1em;
            font-family: 'Orbitron', monospace;
            opacity: 0; transition: opacity 0.3s; z-index: 200; white-space: nowrap;
        }
        #toast.show    { opacity: 1; }
        #toast.error   { border-color: #ef4444; color: #ef4444; }
        #toast.success { border-color: var(--blue); color: var(--blue-lt); }

        /* ── Share sheet ── */
        #share-sheet {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(10,10,10,0.88);
            display: none; align-items: flex-end; justify-content: center;
        }
        #share-sheet.open { display: flex; }
        #share-inner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 24px 24px 0 0;
            padding: 20px 20px 36px;
            width: 100%; max-width: 440px;
            animation: slideup 0.28s cubic-bezier(0.32,0.72,0,1);
        }
        .share-handle {
            width: 36px; height: 4px;
            background: var(--dim); border-radius: 2px;
            margin: 0 auto 20px;
        }
        .share-opt {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 16px; border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            cursor: pointer; margin-bottom: 10px;
            transition: background 0.15s, border-color 0.15s;
        }
        .share-opt:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); }
        .share-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .share-lbl { font-size: 0.82rem; font-weight: 600; color: var(--white); }
        .share-sub { font-size: 0.65rem; color: var(--grey); margin-top: 2px; }
        @keyframes slideup {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Access body ── */
        #access-body {
            padding: 100px 20px 30px;
            max-width: 420px;
            margin: 0 auto;
        }
        #access-inner { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="toast"></div>

<!-- ── HEADER ── -->
<div id="page-header">
    <div class="header-center">
        EASTER <span>CHAMPIONSHIP</span>
    </div>
</div>

<!-- ── CORNER BUTTONS ── -->
<a id="btn-invite" class="corner-btn" onclick="inviteFriends(); return false;">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
    </svg>
    INVITE
</a>
<a id="btn-practice" class="corner-btn" href="1in15demo.html">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    PRACTICE
</a>

<!-- ── SHARE SHEET ── -->
<div id="share-sheet" onclick="closeShareSheet(event)">
    <div id="share-inner">
        <div class="share-handle"></div>
        <p class="orbitron text-center mb-5" style="font-size:0.65rem; letter-spacing:0.2em; color:var(--grey);">INVITE A FRIEND</p>
        <div class="share-opt" onclick="shareWhatsApp()">
            <div class="share-icon" style="background:rgba(37,211,102,0.1);">📱</div>
            <div>
                <div class="share-lbl">Share via WhatsApp</div>
                <div class="share-sub">Send invite link directly</div>
            </div>
        </div>
        <div class="share-opt" onclick="copyLink()">
            <div class="share-icon" style="background:rgba(37,99,235,0.1);">🔗</div>
            <div>
                <div class="share-lbl">Copy Invite Link</div>
                <div class="share-sub">Paste anywhere</div>
            </div>
        </div>
        <div class="share-opt" onclick="shareNative()">
            <div class="share-icon" style="background:rgba(255,255,255,0.05);">↗️</div>
            <div>
                <div class="share-lbl">More Options</div>
                <div class="share-sub">System share sheet</div>
            </div>
        </div>
        <button onclick="document.getElementById('share-sheet').classList.remove('open')"
            class="w-full mt-2 py-3 rounded-2xl orbitron text-center cursor-pointer"
            style="background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--grey); font-size:0.62rem; letter-spacing:0.12em;">
            CANCEL
        </button>
    </div>
</div>

<!-- ── ACCESS BODY — scrollable, clears bottom nav ── -->
<div id="access-body">
    <div id="access-inner" class="fade-in">

        <!-- Access card -->
        <div class="glass-panel rounded-[2rem] p-8 text-center mb-6">
            <div class="mx-auto mb-5 flex items-center justify-center rounded-2xl"
                 style="width:56px; height:56px; background:rgba(37,99,235,0.1); border:1px solid rgba(37,99,235,0.25);">
                <svg width="24" height="24" fill="none" viewBox="0 0 24 24">
                    <rect x="5" y="11" width="14" height="10" rx="2" stroke="#3b82f6" stroke-width="1.5"/>
                    <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="orbitron mb-1" style="font-size:0.6rem; letter-spacing:0.3em; color:var(--blue-lt);">EASTER CHAMPIONSHIP</div>
            <h2 class="orbitron font-black uppercase tracking-tighter mb-1" style="font-size:1.25rem;">10in200 Arena</h2>
            <p class="orbitron mb-7" style="font-size:0.62rem; letter-spacing:0.18em; color:var(--grey);">ENTER YOUR SECRET CODE TO JOIN</p>

            <input id="secret-code-input" type="text" maxlength="10" placeholder="XXXXXXXXXX"
                class="code-input mb-4"
                onkeydown="if(event.key==='Enter') verifySecretCode()" />

            <button id="code-submit-btn" onclick="verifySecretCode()"
                class="btn-blue w-full py-4 rounded-2xl font-black uppercase tracking-tighter orbitron"
                style="font-size:0.82rem;">
                VERIFY & ENTER →
            </button>
        </div>

        <!-- "Don't have an access code?" — block flow, stays above sticky nav -->
        <div class="text-center">
            <p class="mb-3" style="font-size:0.72rem; color:var(--grey);">
                Don't have an access code?
            </p>
            <a href="https://wa.me/2347074150855?text=Hi%2C%20I%20want%20to%20join%20the%2010in200%20Easter%20Championship%20Arena.%20Please%20send%20me%20my%20access%20code."
               target="_blank"
               class="inline-flex items-center justify-center gap-2 w-full py-4 rounded-2xl font-bold orbitron"
               style="background:rgba(37,211,102,0.08); border:1px solid rgba(37,211,102,0.22); color:#25d366; font-size:0.72rem; letter-spacing:0.08em; text-decoration:none; transition:background 0.15s;"
               onmouseover="this.style.background='rgba(37,211,102,0.15)'"
               onmouseout="this.style.background='rgba(37,211,102,0.08)'">
                <svg width="18" height="18" viewBox="0 0 32 32" fill="currentColor">
                    <path d="M16 2C8.268 2 2 8.268 2 16c0 2.49.651 4.83 1.79 6.86L2 30l7.34-1.77A13.94 13.94 0 0 0 16 30c7.732 0 14-6.268 14-14S23.732 2 16 2zm0 25.5a11.44 11.44 0 0 1-5.83-1.6l-.42-.25-4.35 1.05 1.08-4.23-.28-.44A11.5 11.5 0 1 1 16 27.5zm6.3-8.6c-.35-.17-2.06-1.01-2.38-1.13-.32-.11-.55-.17-.78.17-.23.35-.88 1.13-1.08 1.36-.2.23-.4.26-.74.09-.35-.17-1.47-.54-2.8-1.72-1.03-.92-1.73-2.06-1.93-2.4-.2-.35-.02-.54.15-.71.15-.15.35-.4.52-.6.17-.2.23-.34.35-.57.11-.23.06-.43-.03-.6-.09-.17-.78-1.88-1.07-2.57-.28-.67-.57-.58-.78-.59H9.9c-.2 0-.52.07-.79.35-.26.28-1 1-1 2.44s1.03 2.83 1.17 3.03c.15.2 2.03 3.1 4.92 4.35.69.3 1.22.47 1.64.6.69.22 1.32.19 1.81.12.55-.08 1.7-.7 1.94-1.37.23-.67.23-1.24.16-1.37-.07-.12-.26-.2-.6-.35z"/>
                </svg>
                GET MY ACCESS CODE
            </a>
        </div>

    </div>
</div>

<script src="nav.js"></script>
<script>
    const SB_URL   = 'https://tbvmgcknkwsucstedigd.supabase.co';
    const SB_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRidm1nY2tua3dzdWNzdGVkaWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5ODgwMjQsImV4cCI6MjA4MzU2NDAyNH0.OhfvqWaGLwNvIJq8TBDomdtKWDII5MvC6zhKKJBUD9Q';
    const sb       = window.supabase.createClient(SB_URL, SB_KEY);
    const LOBBY_ID = '10in200';

    let currentUser = localStorage.getItem('league_user');
    if (!currentUser) {
        currentUser = "PLR_" + Math.random().toString(36).substring(2, 8).toUpperCase();
        localStorage.setItem('league_user', currentUser);
    }

    /* ── If already verified, skip straight to the lobby ── */
    (async function checkExistingCode() {
        const savedCode = localStorage.getItem('league_code_' + LOBBY_ID);
        if (!savedCode) return;
        const { data } = await sb.from('lobby_codes')
            .select('*').eq('lobby_id', LOBBY_ID)
            .eq('code', savedCode).eq('used_by', currentUser).maybeSingle();
        if (data) window.location.replace('10in200lobby.html');
    })();

    /* ── Toast ── */
    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = `show ${type}`;
        setTimeout(() => { t.className = ''; }, 3500);
    }

    /* ── Verify code → redirect to lobby ── */
    async function verifySecretCode() {
        const input = document.getElementById('secret-code-input').value.trim().toUpperCase();
        if (!input) { showToast('ENTER A CODE', 'error'); return; }
        const btn = document.getElementById('code-submit-btn');
        btn.classList.add('btn-loading'); btn.textContent = '';

        const { data, error } = await sb.from('lobby_codes')
            .select('*').eq('lobby_id', LOBBY_ID).eq('code', input).maybeSingle();

        btn.classList.remove('btn-loading'); btn.textContent = 'VERIFY & ENTER →';

        if (error || !data) { showToast('INVALID CODE', 'error'); return; }
        if (data.used_by && data.used_by !== currentUser) { showToast('CODE ALREADY USED', 'error'); return; }

        if (!data.used_by) {
            await sb.from('lobby_codes')
                .update({ used_by: currentUser })
                .eq('code', input).eq('lobby_id', LOBBY_ID);
        }
        localStorage.setItem('league_code_' + LOBBY_ID, input);
        showToast('ACCESS GRANTED', 'success');
        setTimeout(() => { window.location.href = '10in200lobby.html'; }, 900);
    }

    /* ── Share / Invite ── */
    const INVITE_URL = `${location.origin}/1in15demo.html`;
    const INVITE_MSG = `🐔 Join the Easter Championship on Chicken League!\n\n10in200 Arena — top 10 players win BIG prizes!\n🥇 Grand Prize for 1st place\n🎟️ Free codes for ranks 2-10\n\nTry the demo first: ${INVITE_URL}\n\nGet your access code: https://wa.me/2347074150855`;

    async function inviteFriends() {
        if (navigator.share) {
            try {
                await navigator.share({ title: 'Chicken League — Easter Championship', text: INVITE_MSG, url: INVITE_URL });
                return;
            } catch (err) {
                if (err.name === 'AbortError') return;
            }
        }
        openShareSheet();
    }

    function openShareSheet()  { document.getElementById('share-sheet').classList.add('open'); }
    function closeShareSheet(e) {
        if (e.target === document.getElementById('share-sheet'))
            document.getElementById('share-sheet').classList.remove('open');
    }
    function shareWhatsApp() {
        window.open(`https://wa.me/?text=${encodeURIComponent(INVITE_MSG)}`, '_blank');
        document.getElementById('share-sheet').classList.remove('open');
    }
    async function copyLink() {
        try { await navigator.clipboard.writeText(INVITE_URL); showToast('LINK COPIED!', 'success'); }
        catch (_) { showToast('COPY FAILED', 'error'); }
        document.getElementById('share-sheet').classList.remove('open');
    }
    function shareNative() {
        if (navigator.share) {
            navigator.share({ title: 'Chicken League — Easter Championship', text: INVITE_MSG, url: INVITE_URL }).catch(()=>{});
        } else { copyLink(); return; }
        document.getElementById('share-sheet').classList.remove('open');
    }
</script>
</body>
</html>
