<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena | Chicken League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #fbbf24; --glow: rgba(251,191,36,0.5); --bg: #050505; }
        * { box-sizing: border-box; }
        body {
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            min-height: 100vh; overflow: hidden; touch-action: none;
            background-image: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(251,191,36,0.07) 0%, transparent 60%);
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        #hud {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px 10px; max-width: 400px; margin: 0 auto;
        }
        .hud-pill {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 999px; padding: 6px 14px;
            display: flex; flex-direction: column; align-items: center; min-width: 72px;
        }
        #timer-wrap { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
        #timer-wrap svg { transform: rotate(-90deg); position: absolute; top: 0; left: 0; }
        .arc-bg  { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 4; }
        .arc-fill {
            fill: none; stroke: var(--gold); stroke-width: 4; stroke-linecap: round;
            stroke-dasharray: 176; stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.5s;
            filter: drop-shadow(0 0 5px var(--gold));
        }
        .arc-fill.danger { stroke: #ef4444; filter: drop-shadow(0 0 5px #ef4444); }
        #timer-text {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 900; color: var(--gold);
        }
        #timer-text.danger { color: #ef4444; }
        
        /* ── FIXED: Changed from max-width 400px to fill available space ── */
        #board-wrap { 
            width: 100%; 
            height: calc(100vh - 200px);
            max-width: none;
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 0 12px;
            margin: 0 auto;
        }
        #arena-container {
            position: relative; 
            border-radius: 1.5rem;
            background: #050505; 
            border: 1px solid rgba(255,255,255,0.08); 
            overflow: hidden;
            aspect-ratio: 1; /* ← Make it square */
            width: 100%;
            max-width: 400px;
        }
        #grid-bg { position: absolute; top: 0; left: 0; display: grid; z-index: 1; pointer-events: none; }
        .grid-cell { border: 0.5px dotted rgba(255,255,255,0.07); }
        #item-layer { position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }
        #touch-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; touch-action: none; }
        .item {
            position: absolute; display: flex; align-items: center; justify-content: center;
            transition: transform 0.12s cubic-bezier(0.4,0,0.2,1);
            pointer-events: none; user-select: none;
        }
        .match-vanish { transform: scale(0) !important; opacity: 0; transition: transform 0.15s ease, opacity 0.15s ease !important; }
        .score-pop {
            position: fixed; font-family: 'Orbitron', sans-serif; font-weight: 900;
            color: var(--gold); font-size: 1.1rem; pointer-events: none; z-index: 99;
            animation: score-float 0.9s ease forwards;
        }
        @keyframes score-float {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-55px) scale(1.3); }
        }
        #gameover {
            position: fixed; inset: 0; z-index: 50; background: rgba(5,5,5,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
        }
        #gameover.show { display: flex; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        #intro {
            position: fixed; inset: 0; z-index: 60; background: rgba(5,5,5,0.97);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #intro-number {
            font-family: 'Orbitron', sans-serif; font-size: 7rem; font-weight: 900;
            color: var(--gold); text-shadow: 0 0 60px var(--glow); animation: intro-pop 0.8s ease;
        }
        @keyframes intro-pop {
            0%   { transform: scale(2); opacity: 0; }
            50%  { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1); }
        }
        .lb-row {
            display: flex; align-items: center; gap: 10px; padding: 8px 12px;
            border-radius: 10px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
        }
        .lb-row.me { background: rgba(251,191,36,0.07); border-color: rgba(251,191,36,0.25); }
        #already-played {
            position: fixed; inset: 0; z-index: 70; background: rgba(5,5,5,0.97);
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
        }
        #already-played.show { display: flex; }
    </style>
</head>
<body>

    <!-- ALREADY PLAYED BLOCKER -->
    <div id="already-played">
        <div class="glass rounded-[2rem] p-8 w-full max-w-sm text-center">
            <div class="text-6xl mb-4">🐔</div>
            <h2 class="orbitron text-lg font-black uppercase tracking-tighter mb-2 text-yellow-400">Score Submitted!</h2>
            <p class="text-zinc-400 text-[10px] orbitron tracking-widest mb-6">YOU HAVE ALREADY PLAYED THIS ROUND. AWAIT THE FINAL RESULTS IN THE LOBBY.</p>
            <button onclick="window.location.href='1in15lobby.html'"
                class="w-full py-4 bg-yellow-400 text-black rounded-2xl font-black uppercase italic orbitron tracking-tighter">
                BACK TO LOBBY
            </button>
        </div>
    </div>

    <!-- INTRO -->
    <div id="intro">
        <p class="orbitron text-[10px] text-zinc-500 tracking-widest mb-6">ARENA STARTING IN</p>
        <div id="intro-number">3</div>
        <p class="orbitron text-sm text-zinc-400 mt-6 tracking-widest" id="intro-label">GET READY</p>
    </div>

    <!-- GAME OVER -->
    <div id="gameover">
        <div class="glass rounded-[2rem] p-7 w-full max-w-sm text-center">
            <div class="text-5xl mb-3">🐔</div>
            <h2 class="orbitron text-xl font-black uppercase tracking-tighter mb-1">Time's Up!</h2>
            <p class="text-zinc-500 text-[9px] orbitron tracking-widest mb-5">YOUR SESSION IS COMPLETE</p>
            <div class="bg-yellow-400/10 border border-yellow-400/20 rounded-2xl p-4 mb-5">
                <p class="text-[9px] orbitron text-zinc-500 mb-1">FINAL SCORE</p>
                <p id="final-score" class="orbitron text-4xl font-black text-yellow-400">0</p>
            </div>
            <p class="text-[9px] orbitron text-zinc-600 mb-3 tracking-widest">LEADERBOARD</p>
            <div id="lb-list" class="flex flex-col gap-2 mb-5 max-h-48 overflow-y-auto">
                <div class="text-zinc-600 text-[9px] orbitron text-center py-3">LOADING...</div>
            </div>
            <button onclick="goToLobby()"
                class="w-full py-4 bg-yellow-400 text-black rounded-2xl font-black uppercase italic orbitron tracking-tighter">
                BACK TO LOBBY
            </button>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div class="hud-pill">
            <span class="text-[8px] orbitron text-zinc-500 tracking-widest">SCORE</span>
            <span id="score-display" class="orbitron text-lg font-black text-yellow-400">0</span>
        </div>
        <div id="timer-wrap">
            <svg width="64" height="64" viewBox="0 0 64 64">
                <circle class="arc-bg"   cx="32" cy="32" r="28"/>
                <circle class="arc-fill" id="arc" cx="32" cy="32" r="28"/>
            </svg>
            <div id="timer-text">60</div>
        </div>
        <div class="hud-pill">
            <span class="text-[8px] orbitron text-zinc-500 tracking-widest">COMBO</span>
            <span id="combo-display" class="orbitron text-lg font-black text-white">x1</span>
        </div>
    </div>

    <!-- BOARD -->
    <div id="board-wrap">
        <div id="arena-container">
            <div id="grid-bg"></div>
            <div id="item-layer"></div>
            <div id="touch-mask"></div>
        </div>
    </div>

    <script>
        const sb = window.supabase.createClient(
            'https://tbvmgcknkwsucstedigd.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRidm1nY2tua3dzdWNzdGVkaWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5ODgwMjQsImV4cCI6MjA4MzU2NDAyNH0.OhfvqWaGLwNvIJq8TBDomdtKWDII5MvC6zhKKJBUD9Q'
        );

        const LOBBY_ID = '1in15';
        const currentUser = localStorage.getItem('league_user') || 'GUEST';

        /* ── FIXED: Changed ROWS from 9 to 6 ── */
        const COLS = 6;
        const ROWS = 6;  /* ← CHANGED from 9 */
        const GAME_SECS = 60;
        const ITEMS = ['🌽','🍗','🥚','🐔','🌾','👩🏻‍🌾'];
        const ITEM_COUNT = ITEMS.length;
        const SWAP_MS = 120;
        const VANISH_MS = 150;
        const GRAVITY_MS = 160;

        let board = [], score = 0, combo = 1, timeLeft = GAME_SECS;
        let gameTimer = null, gameLive = false, isProcessing = false, scoresSaved = false, CELL = 48;

        let watchdogTimer = null;
        function armWatchdog() {
            clearTimeout(watchdogTimer);
            watchdogTimer = setTimeout(() => {
                if (isProcessing && gameLive) { console.warn('[WATCHDOG] force releasing'); isProcessing = false; }
            }, 2000);
        }
        function disarmWatchdog() { clearTimeout(watchdogTimer); }

        function computeLayout() {
            const wrap = document.getElementById('board-wrap');
            const container = document.getElementById('arena-container');
            const containerW = container.clientWidth;
            CELL = Math.floor((containerW - 30) / COLS);
            container.style.width  = (CELL * COLS) + 'px';
            container.style.height = (CELL * ROWS) + 'px';
            const gridBg = document.getElementById('grid-bg');
            gridBg.style.gridTemplateColumns = `repeat(${COLS}, ${CELL}px)`;
            gridBg.innerHTML = '';
            for (let i = 0; i < ROWS * COLS; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.style.width = CELL + 'px'; cell.style.height = CELL + 'px';
                gridBg.appendChild(cell);
            }
        }

        function typeAt(r, c) {
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return -1;
            if (!board[r] || !board[r][c]) return -1;
            return board[r][c].type;
        }
        function randItem() { return Math.floor(Math.random() * ITEM_COUNT); }

        function initBoard() {
            board = [];
            document.getElementById('item-layer').innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    let type, attempts = 0;
                    do { type = randItem(); attempts++; if (attempts > 50) break; }
                    while ((typeAt(r,c-1)===type && typeAt(r,c-2)===type) || (typeAt(r-1,c)===type && typeAt(r-2,c)===type));
                    board[r][c] = makeEl(r, c, type, false);
                }
            }
        }

        function makeEl(r, c, type, fromAbove) {
            const el = document.createElement('div');
            el.className = 'item';
            el.innerHTML = ITEMS[type];
            el.style.width = CELL + 'px'; el.style.height = CELL + 'px';
            el.style.fontSize = Math.floor(CELL * 0.52) + 'px';
            if (fromAbove) {
                el.style.transition = 'none';
                el.style.transform  = `translate(${c * CELL}px, ${-CELL}px)`;
                document.getElementById('item-layer').appendChild(el);
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    el.style.transition = `transform ${GRAVITY_MS}ms cubic-bezier(0.4,0,0.2,1)`;
                    el.style.transform  = `translate(${c * CELL}px, ${r * CELL}px)`;
                }));
            } else {
                el.style.transform = `translate(${c * CELL}px, ${r * CELL}px)`;
                document.getElementById('item-layer').appendChild(el);
            }
            return { type, el };
        }

        function renderBoard() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) board[r][c].el.style.transform = `translate(${c * CELL}px, ${r * CELL}px)`;
                }
            }
        }

        function findMatches() {
            const matched = new Set();
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS - 2; c++) {
                    const t = typeAt(r, c);
                    if (t < 0) continue;
                    if (t === typeAt(r, c+1) && t === typeAt(r, c+2)) {
                        let e = c + 3;
                        while (e < COLS && typeAt(r, e) === t) e++;
                        for (let i = c; i < e; i++) matched.add(`${r},${i}`);
                    }
                }
            }
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS - 2; r++) {
                    const t = typeAt(r, c);
                    if (t < 0) continue;
                    if (t === typeAt(r+1, c) && t === typeAt(r+2, c)) {
                        let e = r + 3;
                        while (e < ROWS && typeAt(e, c) === t) e++;
                        for (let i = r; i < e; i++) matched.add(`${i},${c}`);
                    }
                }
            }
            return [...matched].map(k => k.split(',').map(Number));
        }

        function calcScore(matchCount) {
            const base = matchCount === 3 ? 10 : matchCount === 4 ? 20 : matchCount >= 5 ? 40 + (matchCount - 5) * 10 : 10;
            return base * combo;
        }

        async function processMatches() {
            let matchFound = true;
            while (matchFound) {
                const matches = findMatches();
                if (matches.length === 0) { matchFound = false; break; }
                const pts = calcScore(matches.length);
                score += pts;
                updateScore();
                showScorePop(pts);
                matches.forEach(([r, c]) => {
                    board[r][c].el.classList.add('match-vanish');
                });
                await delay(VANISH_MS);
                matches.forEach(([r, c]) => { board[r][c] = null; });
                dropBoard();
                renderBoard();
                await delay(GRAVITY_MS);
                combo++;
                updateCombo();
            }
            combo = 1;
            updateCombo();
        }

        function dropBoard() {
            for (let c = 0; c < COLS; c++) {
                let emptyRow = ROWS - 1;
                for (let r = ROWS - 1; r >= 0; r--) {
                    if (board[r][c] !== null) {
                        if (r !== emptyRow) { board[emptyRow][c] = board[r][c]; board[r][c] = null; }
                        emptyRow--;
                    }
                }
                for (let r = emptyRow; r >= 0; r--) {
                    board[r][c] = makeEl(r, c, randItem(), true);
                }
            }
        }

        async function trySwap(r1, c1, r2, c2) {
            if (isProcessing) return;
            isProcessing = true;
            armWatchdog();
            combo = 1;
            updateCombo();

            const item1 = board[r1][c1];
            const item2 = board[r2][c2];
            item1.el.style.transform = `translate(${c2 * CELL}px, ${r1 * CELL}px)`;
            item2.el.style.transform = `translate(${c1 * CELL}px, ${r2 * CELL}px)`;
            board[r1][c1] = item2; board[r2][c2] = item1;
            await delay(SWAP_MS);
            if (findMatches().length === 0) {
                item1.el.style.transform = `translate(${c1 * CELL}px, ${r1 * CELL}px)`;
                item2.el.style.transform = `translate(${c2 * CELL}px, ${r2 * CELL}px)`;
                board[r1][c1] = item1; board[r2][c2] = item2;
                await delay(SWAP_MS); isProcessing = false; disarmWatchdog();
            } else { await processMatches(); isProcessing = false; disarmWatchdog(); }
        }

        let tStartX, tStartY, tStartR, tStartC;
        document.getElementById('touch-mask').addEventListener('touchstart', e => {
            if (!gameLive || isProcessing) return;
            const rect = e.currentTarget.getBoundingClientRect();
            tStartX = e.touches[0].clientX - rect.left; tStartY = e.touches[0].clientY - rect.top;
            tStartC = Math.floor(tStartX / CELL); tStartR = Math.floor(tStartY / CELL);
        }, { passive: true });
        document.getElementById('touch-mask').addEventListener('touchend', e => {
            if (!gameLive || isProcessing || tStartR === undefined) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const dx = (e.changedTouches[0].clientX - rect.left) - tStartX;
            const dy = (e.changedTouches[0].clientY - rect.top)  - tStartY;
            const THR = 18;
            let tr = tStartR, tc = tStartC;
            if (Math.abs(dx) > Math.abs(dy)) { if (Math.abs(dx) > THR) tc += dx > 0 ? 1 : -1; }
            else { if (Math.abs(dy) > THR) tr += dy > 0 ? 1 : -1; }
            if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS && (tr !== tStartR || tc !== tStartC)) trySwap(tStartR, tStartC, tr, tc);
            tStartR = undefined;
        }, { passive: true });

        let mStartX, mStartY, mStartR, mStartC, mouseDown = false;
        document.getElementById('touch-mask').addEventListener('mousedown', e => {
            if (!gameLive || isProcessing) return;
            const rect = e.currentTarget.getBoundingClientRect();
            mStartX = e.clientX - rect.left; mStartY = e.clientY - rect.top;
            mStartC = Math.floor(mStartX / CELL); mStartR = Math.floor(mStartY / CELL); mouseDown = true;
        });
        document.getElementById('touch-mask').addEventListener('mouseup', e => {
            if (!gameLive || isProcessing || !mouseDown) return;
            mouseDown = false;
            const rect = e.currentTarget.getBoundingClientRect();
            const dx = (e.clientX - rect.left) - mStartX, dy = (e.clientY - rect.top) - mStartY;
            const THR = 18;
            let tr = mStartR, tc = mStartC;
            if (Math.abs(dx) > Math.abs(dy)) { if (Math.abs(dx) > THR) tc += dx > 0 ? 1 : -1; }
            else { if (Math.abs(dy) > THR) tr += dy > 0 ? 1 : -1; }
            if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS && (tr !== mStartR || tc !== mStartC)) trySwap(mStartR, mStartC, tr, tc);
        });

        function updateScore() { document.getElementById('score-display').innerText = score; }
        function updateCombo() {
            const el = document.getElementById('combo-display');
            el.innerText = `x${combo}`;
            el.style.color = combo >= 4 ? '#fbbf24' : combo >= 2 ? '#a78bfa' : 'white';
        }
        function showScorePop(pts) {
            const pop = document.createElement('div');
            pop.className = 'score-pop'; pop.innerText = `+${pts}`;
            pop.style.left = (Math.random() * 55 + 20) + '%'; pop.style.top = '110px';
            document.body.appendChild(pop); setTimeout(() => pop.remove(), 950);
        }

        function startGameTimer() {
            const arc = document.getElementById('arc'), timerText = document.getElementById('timer-text');
            gameTimer = setInterval(async () => {
                timeLeft--;
                arc.style.strokeDashoffset = 176 * (1 - timeLeft / GAME_SECS);
                timerText.innerText = timeLeft;
                if (timeLeft <= 10) { arc.classList.add('danger'); timerText.classList.add('danger'); }
                if (timeLeft <= 0)  { clearInterval(gameTimer); gameLive = false; isProcessing = true; await endGame(); }
            }, 1000);
        }

        async function endGame() {
            if (scoresSaved) return; scoresSaved = true; disarmWatchdog();
            await sb.from('game_sessions').upsert({
                lobby_id: LOBBY_ID, player_username: currentUser,
                score, is_complete: true, finished_at: new Date().toISOString()
            }, { onConflict: 'lobby_id,player_username' });
            document.getElementById('final-score').innerText = score;
            const { data: lb } = await sb.from('game_sessions')
                .select('player_username, score, is_complete').eq('lobby_id', LOBBY_ID).order('score', { ascending: false });
            renderLeaderboard(lb || []);
            document.getElementById('gameover').classList.add('show');
        }

        function renderLeaderboard(rows) {
            const medals = ['🥇','🥈','🥉'];
            const list = document.getElementById('lb-list');
            if (!rows.length) { list.innerHTML = `<div class="text-zinc-600 text-[9px] orbitron text-center py-3">NO SCORES YET</div>`; return; }
            list.innerHTML = rows.map((r, i) => `
                <div class="lb-row ${r.player_username === currentUser ? 'me' : ''}">
                    <span class="text-sm">${medals[i] || '#'+(i+1)}</span>
                    <span class="orbitron text-xs font-bold flex-1 truncate ${r.player_username === currentUser ? 'text-yellow-400' : 'text-white'}">
                        ${r.player_username === currentUser ? 'YOU' : r.player_username}
                    </span>
                    <span class="orbitron text-yellow-400 font-black text-sm">${r.score}</span>
                    <span class="text-[8px] px-2 py-0.5 rounded-full orbitron ml-1
                        ${r.is_complete ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-zinc-800 text-zinc-500'}">
                        ${r.is_complete ? 'DONE' : '⏳'}
                    </span>
                </div>`).join('');
        }

        function goToLobby() { window.location.href = '1in15lobby.html'; }

        function runIntro() {
            const numEl = document.getElementById('intro-number'), labelEl = document.getElementById('intro-label');
            const steps = [
                { text: '3', label: 'GET READY',        ms: 900 },
                { text: '2', label: 'STEADY...',         ms: 900 },
                { text: '1', label: 'ALMOST...',         ms: 900 },
                { text: 'GO', label: '🐔 MATCH TO WIN!', ms: 700 },
            ];
            let i = 0;
            function next() {
                if (i >= steps.length) { document.getElementById('intro').style.display = 'none'; gameLive = true; startGameTimer(); return; }
                const s = steps[i++];
                numEl.style.animation = 'none'; void numEl.offsetWidth; numEl.style.animation = 'intro-pop 0.8s ease';
                numEl.innerText = s.text; labelEl.innerText = s.label;
                setTimeout(next, s.ms);
            }
            next();
        }

        function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

        sb.channel('arena_lb')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'game_sessions' }, async () => {
                if (document.getElementById('gameover').classList.contains('show')) {
                    const { data: lb } = await sb.from('game_sessions')
                        .select('player_username, score, is_complete').eq('lobby_id', LOBBY_ID).order('score', { ascending: false });
                    renderLeaderboard(lb || []);
                }
            }).subscribe();

        computeLayout();
        window.addEventListener('resize', computeLayout);
        initBoard();

        async function checkAlreadyPlayed() {
            const { data } = await sb.from('game_sessions')
                .select('is_complete').eq('lobby_id', LOBBY_ID).eq('player_username', currentUser).eq('is_complete', true).maybeSingle();
            if (data) { document.getElementById('intro').style.display = 'none'; document.getElementById('already-played').classList.add('show'); return; }
            runIntro();
        }
        checkAlreadyPlayed();
    </script>
</body>
</html>
