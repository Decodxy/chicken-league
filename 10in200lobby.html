<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10in200 Lobby | Chicken League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green:    #10b981; --green-lt: #34d399;
            --green-glow: rgba(16,185,129,0.5);
            --bg: #050505;
        }
        body {
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(16,185,129,0.04) 0%, transparent 70%);
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); }

        /* ── Countdown ring ── */
        .countdown-ring { position: relative; width: 110px; height: 110px; margin: 0 auto; }
        .countdown-ring svg { transform: rotate(-90deg); position: absolute; top: 0; left: 0; }
        .countdown-ring .ring-bg  { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 5; }
        .countdown-ring .ring-fill {
            fill: none; stroke: var(--green); stroke-width: 5; stroke-linecap: round;
            stroke-dasharray: 314; stroke-dashoffset: 314;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 6px var(--green));
        }
        .countdown-ring .ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* ── 200-Slot dot grid ── */
        #slots-dot-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 3px;
            padding: 4px;
        }
        .slot-dot {
            width: 100%; aspect-ratio: 1; border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.04);
            transition: all 0.3s;
        }
        .slot-dot.filled { background: var(--green); border-color: var(--green-lt); box-shadow: 0 0 6px var(--green-glow); }
        .slot-dot.mine   { background: #fff; border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* ── Progress bar ── */
        .progress-track { background: rgba(255,255,255,0.05); border-radius: 100px; height: 6px; overflow: hidden; }
        .progress-fill  { height: 100%; background: linear-gradient(90deg, var(--green), var(--green-lt)); border-radius: 100px; transition: width 0.4s ease; }

        /* ── Buttons ── */
        .btn-loading { position: relative; pointer-events: none; opacity: 0.7; }
        .btn-loading::after {
            content: ""; position: absolute; width: 16px; height: 16px;
            top: 0; left: 0; right: 0; bottom: 0; margin: auto;
            border: 2px solid transparent; border-top-color: #000;
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px; border-radius: 12px; font-size: 11px; font-weight: bold;
            letter-spacing: 0.1em; font-family: 'Orbitron', sans-serif;
            opacity: 0; transition: opacity 0.3s; z-index: 100; white-space: nowrap;
        }
        #toast.show { opacity: 1; }
        #toast.error   { border-color: #ef4444; color: #ef4444; }
        #toast.success { border-color: var(--green); color: var(--green-lt); }

        @keyframes arena-unlock {
            0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.6); }
            70%  { box-shadow: 0 0 0 20px rgba(16,185,129,0); }
            100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }
        .arena-open { animation: arena-unlock 1s ease-out 3; }

        main { padding-bottom: 100px; }
    </style>
</head>
<body>

    <div id="debug-status" class="fixed bottom-20 left-4 right-4 z-50 text-[8px] orbitron text-zinc-700 bg-black/80 p-2 rounded border border-white/5 pointer-events-none text-center">
        HANDSHAKE: INITIALIZING...
    </div>
    <div id="toast"></div>

    <!-- MAIN LOBBY -->
    <main class="max-w-md mx-auto p-5" id="main-lobby">

        <!-- Top bar -->
        <div class="mt-4 mb-5 flex items-center justify-between">
            <button onclick="exitLobby()" class="text-gray-600 text-[10px] font-black uppercase tracking-widest hover:text-white orbitron">← EXIT</button>
            <div id="connection-indicator" class="flex items-center gap-2 px-3 py-1 bg-red-500/10 rounded-full">
                <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                <span class="text-[9px] font-bold text-red-500 orbitron">DISCONNECTED</span>
            </div>
        </div>

        <!-- Hero card -->
        <div class="glass-panel rounded-[2rem] overflow-hidden mb-5">
            <div class="h-24 bg-cover bg-center" style="background: linear-gradient(135deg, rgba(16,185,129,0.15) 0%, rgba(5,5,5,0) 100%); border-bottom: 1px solid rgba(16,185,129,0.1);">
                <div class="h-full flex items-center justify-center">
                    <span style="font-size:2.5rem;">🐔</span>
                </div>
            </div>
            <div class="p-5 flex items-center justify-between">
                <div>
                    <h1 class="text-lg font-black italic uppercase orbitron tracking-tighter">Broiler Championship</h1>
                    <p class="text-zinc-500 text-[9px] font-bold uppercase tracking-[0.2em] mt-0.5">200-Player Arena · Chicken League</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-zinc-500 orbitron">TOP 10 WIN</p>
                    <p class="font-black orbitron text-sm" style="color: var(--green-lt);">🐔 10 BROILERS</p>
                </div>
            </div>
        </div>

        <!-- Countdown -->
        <div class="glass-panel p-5 rounded-[2rem] mb-5 text-center">
            <p class="text-[9px] orbitron text-zinc-500 uppercase tracking-widest mb-4" id="timer-label">WAITING FOR LOBBY TO FILL</p>
            <div class="countdown-ring mb-3">
                <svg width="110" height="110" viewBox="0 0 110 110">
                    <circle class="ring-bg"  cx="55" cy="55" r="50"/>
                    <circle class="ring-fill" id="ring-fill" cx="55" cy="55" r="50"/>
                </svg>
                <div class="ring-text">
                    <span id="countdown-display" class="orbitron text-2xl font-black" style="color:var(--green);">--:--</span>
                    <span class="text-[8px] text-zinc-500 orbitron mt-0.5">ARENA OPENS</span>
                </div>
            </div>
            <div id="count_display" class="orbitron text-[10px] font-black tracking-widest mb-3" style="color:var(--green);">SYNCING...</div>

            <!-- Progress bar -->
            <div class="progress-track mx-4">
                <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
            <p class="text-zinc-700 text-[8px] orbitron mt-1 tracking-widest">200 SLOTS TOTAL · TOP 10 SCORES WIN</p>
        </div>

        <!-- 200-Slot dot grid -->
        <div class="glass-panel p-4 rounded-[2rem] mb-5">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-[9px] font-black uppercase tracking-widest text-zinc-500 orbitron">Arena Registry — 200 Slots</h3>
                <span id="slot-legend" class="text-[8px] orbitron text-zinc-600">● FILLED &nbsp; ● YOU &nbsp; · OPEN</span>
            </div>
            <div id="slots-dot-grid"></div>
            <div class="mt-3 flex gap-2">
                <div class="flex items-center gap-1.5">
                    <div class="w-2 h-2 rounded-full" style="background:var(--green);"></div>
                    <span class="text-[8px] orbitron text-zinc-500">JOINED</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <div class="w-2 h-2 rounded-full bg-white"></div>
                    <span class="text-[8px] orbitron text-zinc-500">YOU</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <div class="w-2 h-2 rounded-full" style="background:rgba(255,255,255,0.06);"></div>
                    <span class="text-[8px] orbitron text-zinc-500">OPEN</span>
                </div>
            </div>
        </div>

        <!-- Main action button -->
        <button id="mainBtn" onclick="handleMainAction()"
            class="w-full py-5 bg-zinc-900 text-zinc-600 rounded-2xl font-black uppercase italic tracking-tighter transition-all active:scale-95 orbitron" disabled>
            STARTING SYSTEM...
        </button>
    </main>

    <script src="nav.js"></script>
    <script>
        const SB_URL    = 'https://tbvmgcknkwsucstedigd.supabase.co';
        const SB_KEY    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRidm1nY2tua3dzdWNzdGVkaWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5ODgwMjQsImV4cCI6MjA4MzU2NDAyNH0.OhfvqWaGLwNvIJq8TBDomdtKWDII5MvC6zhKKJBUD9Q';
        const sb        = window.supabase.createClient(SB_URL, SB_KEY);
        const LOBBY_ID  = '10in200';
        const MAX_SLOTS = 200;

        let currentUser = localStorage.getItem('league_user');
        if (!currentUser) {
            currentUser = 'PLR_' + Math.random().toString(36).substring(2, 8).toUpperCase();
            localStorage.setItem('league_user', currentUser);
        }

        let cachedPlayers = [], cachedSignal = null, isProcessing = false, countdownTimer = null;
        const ringMax = 314;

        function log(msg) {
            document.getElementById('debug-status').innerText = `HANDSHAKE: ${msg}`;
            console.log('[10in200]', msg);
        }
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = `show ${type}`;
            setTimeout(() => { t.className = ''; }, 3500);
        }

        // ── Validate session: check localStorage for claimed code ──
        async function validateSessionAndSync() {
            try {
                const savedCode = localStorage.getItem('league_code_' + LOBBY_ID);
                if (!savedCode) {
                    log('NO SESSION CODE — REDIRECTING TO PORTAL');
                    window.location.href = '10in200portal.html';
                    return;
                }

                // Verify code is still valid (claimed by this user, marked as used)
                const { data: codeRecord, error: codeErr } = await sb.from('lobby_10in200_codes')
                    .select('*')
                    .eq('code', savedCode)
                    .eq('claimed_by', currentUser)
                    .eq('is_used', true)
                    .maybeSingle();

                if (codeErr) {
                    log(`CODE VALIDATION ERROR: ${codeErr.message}`);
                    localStorage.removeItem('league_code_' + LOBBY_ID);
                    window.location.href = '10in200portal.html';
                    return;
                }

                if (!codeRecord) {
                    log('SESSION EXPIRED — RETURNING TO PORTAL');
                    localStorage.removeItem('league_code_' + LOBBY_ID);
                    window.location.href = '10in200portal.html';
                    return;
                }

                log('SESSION RESTORED FROM CODE');
                await syncLobby();
            } catch (e) {
                log(`VALIDATION ERROR: ${e.message}`);
                window.location.href = '10in200portal.html';
            }
        }

        // ── Sync lobby state from Supabase ──
        async function syncLobby() {
            try {
                const [{ data: players, error: pErr }, { data: signal, error: sErr }] = await Promise.all([
                    sb.from('lobby_10in200_players').select('*').eq('lobby_id', LOBBY_ID).order('joined_at', { ascending: true }),
                    sb.from('lobby_10in200_signals').select('*').eq('lobby_id', LOBBY_ID).maybeSingle()
                ]);
                if (pErr || sErr) throw (pErr || sErr);
                cachedPlayers = players || [];
                cachedSignal  = signal;
                const ind = document.getElementById('connection-indicator');
                ind.className = 'flex items-center gap-2 px-3 py-1 bg-green-500/10 rounded-full';
                ind.innerHTML = `<span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                                 <span class="text-[9px] font-bold text-green-500 orbitron">CONNECTED</span>`;
                log(`SYNCED ${cachedPlayers.length}/${MAX_SLOTS}`);
                updateUI();
            } catch(e) { log(`SYNC ERROR: ${e.message}`); }
        }

        // ── Update UI based on lobby state ──
        async function updateUI() {
            const total  = cachedPlayers.length;
            const isIn   = cachedPlayers.some(p => p.player_username === currentUser);
            const isFull = total >= MAX_SLOTS;
            const isLive = cachedSignal?.is_live;
            const openAt = cachedSignal?.open_at ? new Date(cachedSignal.open_at) : null;
            const btn    = document.getElementById('mainBtn');

            document.getElementById('count_display').innerText = `${total} / ${MAX_SLOTS} PLAYERS JOINED`;

            // Progress bar
            const pct = Math.min(100, (total / MAX_SLOTS) * 100);
            document.getElementById('progress-fill').style.width = pct + '%';

            // Dot grid (200 dots)
            const grid = document.getElementById('slots-dot-grid');
            grid.innerHTML = '';
            const myIndex = cachedPlayers.findIndex(p => p.player_username === currentUser);
            for (let i = 0; i < MAX_SLOTS; i++) {
                const dot = document.createElement('div');
                dot.className = 'slot-dot' + (i === myIndex ? ' mine' : i < total ? ' filled' : '');
                grid.appendChild(dot);
            }

            clearInterval(countdownTimer);
            if (isLive && openAt) {
                startCountdown(openAt);
            } else {
                document.getElementById('timer-label').innerText = isFull
                    ? 'LOBBY FULL · WAITING FOR ADMIN'
                    : `WAITING FOR PLAYERS (${MAX_SLOTS - total} SLOTS LEFT)`;
                setRing(0, 1);
                document.getElementById('countdown-display').innerText = '--:--';
            }

            if (isProcessing) return;
            const arenaOpen = isLive && openAt && new Date() >= openAt;

            if (arenaOpen && isIn) {
                // Check if user already played
                const { data: played } = await sb.from('game_10in200_sessions')
                    .select('is_complete').eq('lobby_id', LOBBY_ID)
                    .eq('player_username', currentUser).eq('is_complete', true).maybeSingle();
                if (played) {
                    btn.innerText = '✓ SCORE SUBMITTED — AWAIT RESULTS';
                    btn.disabled  = true;
                    btn.className = 'w-full py-5 bg-green-500/10 text-green-400 rounded-2xl font-black uppercase italic tracking-tighter orbitron border border-green-500/20';
                } else {
                    btn.innerText = 'ENTER ARENA →';
                    btn.disabled  = false;
                    btn.className = 'w-full py-5 text-black rounded-2xl font-black uppercase italic tracking-tighter transition-all active:scale-95 orbitron arena-open';
                    btn.style.background = 'var(--green)';
                }
            } else if (!isIn && !isFull) {
                btn.innerText = 'JOIN ARENA';
                btn.disabled  = false;
                btn.className = 'w-full py-5 bg-white text-black rounded-2xl font-black uppercase italic tracking-tighter transition-all active:scale-95 orbitron';
                btn.style.background = '';
            } else if (isIn && !arenaOpen) {
                btn.innerText = (isLive && openAt) ? 'ARENA OPENS SOON...' : (isFull ? 'WAITING FOR ADMIN...' : 'WAITING FOR PLAYERS...');
                btn.disabled  = true;
                btn.className = 'w-full py-5 bg-zinc-900 text-zinc-500 rounded-2xl font-black uppercase italic tracking-tighter orbitron border border-white/5';
                btn.style.background = '';
            } else if (isFull && !isIn) {
                btn.innerText = 'LOBBY FULL';
                btn.disabled  = true;
                btn.className = 'w-full py-5 bg-zinc-900 text-zinc-600 rounded-2xl font-black uppercase italic tracking-tighter orbitron';
                btn.style.background = '';
            }
        }

        function setRing(elapsed, total) {
            const pct = total > 0 ? Math.max(0, 1 - elapsed / total) : 0;
            document.getElementById('ring-fill').style.strokeDashoffset = ringMax * (1 - pct);
        }

        function startCountdown(openAt) {
            const setAt   = cachedSignal?.timer_set_at ? new Date(cachedSignal.timer_set_at) : new Date(Date.now() - 1000);
            const totalMs = Math.max(openAt - setAt, 1000);
            document.getElementById('timer-label').innerText = 'ARENA OPENS IN';
            function tick() {
                const diff = openAt - new Date();
                if (diff <= 0) {
                    clearInterval(countdownTimer);
                    document.getElementById('countdown-display').innerText = '00:00';
                    setRing(totalMs, totalMs);
                    document.getElementById('timer-label').innerText = '🔓 ARENA IS OPEN!';
                    syncLobby();
                    return;
                }
                const mins = String(Math.floor(diff / 60000)).padStart(2, '0');
                const secs = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
                document.getElementById('countdown-display').innerText = `${mins}:${secs}`;
                setRing(totalMs - diff, totalMs);
            }
            tick();
            countdownTimer = setInterval(tick, 1000);
        }

        // ── Main action: join arena or enter game ──
        async function handleMainAction() {
            if (isProcessing) return;
            const isIn   = cachedPlayers.some(p => p.player_username === currentUser);
            const isFull = cachedPlayers.length >= MAX_SLOTS;
            const openAt = cachedSignal?.open_at ? new Date(cachedSignal.open_at) : null;
            const arenaOpen = cachedSignal?.is_live && openAt && new Date() >= openAt;

            if (isIn && arenaOpen) {
                window.location.href = `10in200arena.html?user=${encodeURIComponent(currentUser)}&league=${LOBBY_ID}`;
                return;
            }
            if (!isIn && !isFull) {
                isProcessing = true;
                const btn = document.getElementById('mainBtn');
                btn.innerText = 'REGISTERING...';
                btn.classList.add('btn-loading');
                log(`REGISTERING ${currentUser}...`);
                const { error } = await sb.from('lobby_10in200_players').insert([{ lobby_id: LOBBY_ID, player_username: currentUser }]);
                isProcessing = false;
                btn.classList.remove('btn-loading');
                if (error) { log(`FAILED: ${error.message}`); showToast('JOIN FAILED — TRY AGAIN', 'error'); }
                else { log('JOINED ARENA'); showToast('YOU JOINED THE ARENA!', 'success'); await syncLobby(); }
            }
        }

        // ── Exit lobby and return to dashboard ──
        async function exitLobby() {
            log('REMOVING PLAYER...');
            await sb.from('lobby_10in200_players').delete().eq('lobby_id', LOBBY_ID).eq('player_username', currentUser);
            localStorage.removeItem('league_code_' + LOBBY_ID);
            window.location.href = 'dashboard.html';
        }

        // ── Realtime subscriptions (10in200-specific tables only) ──
        sb.channel('10in200_lobby')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'lobby_10in200_players', filter: `lobby_id=eq.${LOBBY_ID}` }, syncLobby)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'lobby_10in200_signals', filter: `lobby_id=eq.${LOBBY_ID}` }, syncLobby)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'game_10in200_sessions', filter: `lobby_id=eq.${LOBBY_ID}` }, syncLobby)
            .subscribe();

        // ── Initialize: validate session and sync ──
        validateSessionAndSync();
    </script>
</body>
</html>
