<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10 in 200 Lobby | Chicken League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #131314;
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .slot-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 16px;
        }
        .slot {
            aspect-ratio: 1;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: 2px solid #2a2a2c;
            background: #1a1a1b;
        }
        .slot.filled {
            background: linear-gradient(135deg, #4285F4 0%, #357ae8 100%);
            border-color: #4285F4;
        }
        .slot.you {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            border-color: #fbbf24;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
        }
        .countdown-ring {
            width: 200px;
            height: 200px;
            position: relative;
        }
        .countdown-ring svg {
            transform: rotate(-90deg);
        }
        .countdown-ring circle {
            fill: none;
            stroke-width: 8;
        }
        .countdown-ring .bg {
            stroke: #2a2a2c;
        }
        .countdown-ring .progress {
            stroke: #4285F4;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }
        .countdown-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto">
        
        <!-- Header -->
        <div class="p-4 border-b border-gray-800">
            <h1 class="text-2xl font-black text-center">10 IN 200 LOBBY</h1>
            <p class="text-xs text-gray-500 text-center mt-1">Top 10 players win broiler chickens</p>
        </div>

        <!-- Status Bar -->
        <div id="statusBar" class="bg-[#1a1a1b] p-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div id="connectionDot" class="w-3 h-3 rounded-full bg-gray-600"></div>
                <span id="connectionText" class="text-xs text-gray-500">Connecting...</span>
            </div>
            <div class="text-sm">
                <span id="playerCount" class="text-[#4285F4] font-black">0</span>
                <span class="text-gray-600">/200</span>
            </div>
        </div>

        <!-- Countdown Screen (hidden initially) -->
        <div id="countdownScreen" class="hidden fixed inset-0 bg-[#131314] z-50 flex flex-col items-center justify-center">
            <h2 class="text-xl font-black mb-4">ARENA OPENING IN</h2>
            <div class="countdown-ring">
                <svg width="200" height="200">
                    <circle class="bg" cx="100" cy="100" r="90"></circle>
                    <circle id="progressCircle" class="progress" cx="100" cy="100" r="90" 
                        stroke-dasharray="565.48" stroke-dashoffset="565.48"></circle>
                </svg>
                <div id="countdownNumber" class="countdown-text">--</div>
            </div>
            <p class="text-xs text-gray-500 mt-4">Get ready for battle!</p>
        </div>

        <!-- Slot Grid -->
        <div id="slotGrid" class="slot-grid"></div>

        <!-- Main Action Button -->
        <div class="fixed bottom-20 left-0 right-0 px-4">
            <button id="mainActionBtn" disabled
                class="w-full max-w-md mx-auto block bg-gray-700 text-gray-400 font-black py-4 px-6 rounded-xl text-sm transition-all duration-200 disabled:cursor-not-allowed">
                WAITING FOR LOBBY TO OPEN...
            </button>
        </div>

        <!-- Exit Button -->
        <button id="exitBtn" class="fixed top-4 right-4 w-10 h-10 rounded-full bg-red-600 hover:bg-red-700 flex items-center justify-center text-white font-bold transition-colors duration-200">
            ✕
        </button>

    </div>

    <!-- External Nav -->
    <script src="nav.js"></script>

    <script>
        const SB_URL = 'https://tbvmgcknkwsucstedigd.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRidm1nY2tua3dzdWNzdGVkaWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5ODgwMjQsImV4cCI6MjA4MzU2NDAyNH0.OhfvqWaGLwNvIJq8TBDomdtKWDII5MvC6zhKKJBUD9Q';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const LOBBY_ID = '10in200';
        const MAX_SLOTS = 200;
        
        let myUsername = null;
        let lobbyState = {
            players: [],
            signal: null,
            countdown: null
        };

        // ══════════════════════════════════════════════════════════════
        // SESSION CHECK - Verify portal access
        // ══════════════════════════════════════════════════════════════
        function checkSession() {
            const sessionData = localStorage.getItem(`lobby_session_${LOBBY_ID}`);
            
            if (!sessionData) {
                // No session - redirect to portal
                window.location.href = '10in200portal.html';
                return false;
            }

            try {
                const session = JSON.parse(sessionData);
                myUsername = session.username;
                
                // Check if session is still valid (within 24 hours)
                const sessionAge = Date.now() - session.timestamp;
                if (sessionAge > 24 * 60 * 60 * 1000) {
                    // Session expired
                    localStorage.removeItem(`lobby_session_${LOBBY_ID}`);
                    window.location.href = '10in200portal.html';
                    return false;
                }
                
                return true;
            } catch (e) {
                console.error('Session parse error:', e);
                localStorage.removeItem(`lobby_session_${LOBBY_ID}`);
                window.location.href = '10in200portal.html';
                return false;
            }
        }

        // ══════════════════════════════════════════════════════════════
        // SLOT RENDERING - 200 SLOTS (40 rows × 5 columns)
        // ══════════════════════════════════════════════════════════════
        function renderSlots() {
            const grid = document.getElementById('slotGrid');
            const slots = [];

            for (let i = 0; i < MAX_SLOTS; i++) {
                const player = lobbyState.players[i];
                const isYou = player && player.player_username === myUsername;
                
                const slot = document.createElement('div');
                slot.className = `slot ${player ? (isYou ? 'you' : 'filled') : ''}`;
                
                if (player) {
                    const initial = player.player_username.charAt(0).toUpperCase();
                    slot.innerHTML = `
                        <div class="text-lg font-black">${initial}</div>
                        <div class="text-[8px] text-white/60 mt-1">#${i + 1}</div>
                    `;
                } else {
                    slot.innerHTML = `
                        <div class="text-2xl text-gray-700">${i + 1}</div>
                    `;
                }
                
                slots.push(slot);
            }

            grid.innerHTML = '';
            slots.forEach(s => grid.appendChild(s));
            
            document.getElementById('playerCount').textContent = lobbyState.players.length;
        }

        // ══════════════════════════════════════════════════════════════
        // LOBBY JOIN/LEAVE
        // ══════════════════════════════════════════════════════════════
        async function joinLobby() {
            try {
                // Check if already joined
                const existing = lobbyState.players.find(p => p.player_username === myUsername);
                if (existing) {
                    updateMainButton();
                    return;
                }

                // Insert player
                await sb.from('lobby_players').insert({
                    lobby_id: LOBBY_ID,
                    player_username: myUsername,
                    is_active: true
                });

                console.log('Joined lobby successfully');
            } catch (error) {
                console.error('Join lobby error:', error);
            }
        }

        async function leaveLobby() {
            try {
                await sb.from('lobby_players')
                    .delete()
                    .eq('lobby_id', LOBBY_ID)
                    .eq('player_username', myUsername);
                
                localStorage.removeItem(`lobby_session_${LOBBY_ID}`);
                window.location.href = 'lobby.html';
            } catch (error) {
                console.error('Leave lobby error:', error);
            }
        }

        // ══════════════════════════════════════════════════════════════
        // MAIN ACTION BUTTON LOGIC
        // ══════════════════════════════════════════════════════════════
        function updateMainButton() {
            const btn = document.getElementById('mainActionBtn');
            const inLobby = lobbyState.players.some(p => p.player_username === myUsername);
            const arenaOpen = lobbyState.signal?.is_live && 
                             lobbyState.signal?.open_at && 
                             new Date(lobbyState.signal.open_at) <= new Date();

            if (arenaOpen && inLobby) {
                // Arena is open, redirect immediately
                window.location.href = '10in200arena.html';
            } else if (inLobby) {
                btn.textContent = 'WAITING FOR ARENA TO OPEN...';
                btn.className = 'w-full max-w-md mx-auto block bg-gray-700 text-gray-400 font-black py-4 px-6 rounded-xl text-sm transition-all duration-200 cursor-not-allowed';
                btn.disabled = true;
            } else {
                btn.textContent = 'JOIN LOBBY';
                btn.className = 'w-full max-w-md mx-auto block bg-[#4285F4] hover:bg-[#3367d6] text-white font-black py-4 px-6 rounded-xl text-sm transition-all duration-200';
                btn.disabled = false;
                btn.onclick = joinLobby;
            }
        }

        // ══════════════════════════════════════════════════════════════
        // COUNTDOWN DISPLAY
        // ══════════════════════════════════════════════════════════════
        function handleCountdown() {
            const signal = lobbyState.signal;
            if (!signal?.timer_set_at) {
                document.getElementById('countdownScreen').classList.add('hidden');
                return;
            }

            const timerSet = new Date(signal.timer_set_at);
            const openAt = new Date(signal.open_at);
            const totalDuration = openAt - timerSet;
            const elapsed = Date.now() - timerSet;
            const remaining = openAt - Date.now();

            if (remaining <= 0) {
                // Countdown finished, redirect to arena
                const inLobby = lobbyState.players.some(p => p.player_username === myUsername);
                if (inLobby) {
                    window.location.href = '10in200arena.html';
                }
                return;
            }

            if (remaining <= 60000) { // Show countdown in last 60 seconds
                document.getElementById('countdownScreen').classList.remove('hidden');
                const seconds = Math.ceil(remaining / 1000);
                document.getElementById('countdownNumber').textContent = seconds;

                // Update ring progress
                const progress = elapsed / totalDuration;
                const circumference = 2 * Math.PI * 90;
                const offset = circumference * (1 - progress);
                document.getElementById('progressCircle').style.strokeDashoffset = offset;
            } else {
                document.getElementById('countdownScreen').classList.add('hidden');
            }
        }

        // ══════════════════════════════════════════════════════════════
        // CONNECTION STATUS
        // ══════════════════════════════════════════════════════════════
        function updateConnectionStatus(connected) {
            const dot = document.getElementById('connectionDot');
            const text = document.getElementById('connectionText');
            
            if (connected) {
                dot.className = 'w-3 h-3 rounded-full bg-green-500 animate-pulse';
                text.textContent = 'Connected';
                text.className = 'text-xs text-green-400';
            } else {
                dot.className = 'w-3 h-3 rounded-full bg-red-500';
                text.textContent = 'Disconnected';
                text.className = 'text-xs text-red-400';
            }
        }

        // ══════════════════════════════════════════════════════════════
        // REAL-TIME SUBSCRIPTIONS
        // ══════════════════════════════════════════════════════════════
        async function loadInitialData() {
            const [playersRes, signalRes] = await Promise.all([
                sb.from('lobby_players')
                    .select('*')
                    .eq('lobby_id', LOBBY_ID)
                    .eq('is_active', true)
                    .order('joined_at', { ascending: true }),
                sb.from('lobby_signals')
                    .select('*')
                    .eq('lobby_id', LOBBY_ID)
                    .maybeSingle()
            ]);

            lobbyState.players = playersRes.data || [];
            lobbyState.signal = signalRes.data;

            renderSlots();
            updateMainButton();
            handleCountdown();
            updateConnectionStatus(true);
        }

        function subscribeToLobby() {
            sb.channel(`lobby_${LOBBY_ID}`)
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'lobby_players',
                    filter: `lobby_id=eq.${LOBBY_ID}`
                }, async () => {
                    const { data } = await sb.from('lobby_players')
                        .select('*')
                        .eq('lobby_id', LOBBY_ID)
                        .eq('is_active', true)
                        .order('joined_at', { ascending: true });
                    
                    lobbyState.players = data || [];
                    renderSlots();
                    updateMainButton();
                })
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'lobby_signals',
                    filter: `lobby_id=eq.${LOBBY_ID}`
                }, async () => {
                    const { data } = await sb.from('lobby_signals')
                        .select('*')
                        .eq('lobby_id', LOBBY_ID)
                        .maybeSingle();
                    
                    lobbyState.signal = data;
                    updateMainButton();
                    handleCountdown();
                })
                .subscribe((status) => {
                    updateConnectionStatus(status === 'SUBSCRIBED');
                });
        }

        // ══════════════════════════════════════════════════════════════
        // EXIT BUTTON
        // ══════════════════════════════════════════════════════════════
        document.getElementById('exitBtn').addEventListener('click', () => {
            if (confirm('Leave lobby?')) {
                leaveLobby();
            }
        });

        // ══════════════════════════════════════════════════════════════
        // COUNTDOWN INTERVAL
        // ══════════════════════════════════════════════════════════════
        setInterval(handleCountdown, 1000);

        // ══════════════════════════════════════════════════════════════
        // INITIALIZATION
        // ══════════════════════════════════════════════════════════════
        if (checkSession()) {
            loadInitialData();
            subscribeToLobby();
        }
    </script>

</body>
</html>
